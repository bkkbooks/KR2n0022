body:
  text: 蘭亭考卷四宋桑世昌撰永字八法未有蘭亭此法已具祕於傳授者不一今蘭亭首偹此法但側微變要亦有自云努啄磔側躍勒策掠側勢一法書苑曰側不可平其筆當側筆就左為之口訣云先左揭其腕次輕蹲其鋒取勢緊則乘機頓挫借勢出之疾則失中過又成俗李陽冰筆訣曰側者側下其筆使墨精暗墜徐乃反揭則稜利矣此永字頭一點是也臨池要訣曰永字當側筆就左為之先左揭其腕次輕蹲其鋒不嶮則體勢鈍鈍則芒角隱而神格滅禁經曰點如利鑽鏤金右軍曰作點之法皆須落如大石當衢勒勢二筆訣曰勒者即是永字第二筆橫畫之法築鋒而䇿仰筆而後收凖此用筆形勢自彰矣努勢三口訣曰凡傍卷微曲蹙筆纍走而進之直則衆勢失力滯則神氣怯散夫努須側鋒顧右潛躍輕挫其揭筆訣曰努者即是永字第三筆為努筆之法豎筆而徐行近左引勢一本無近左引勢四字勢不欲直直則無力矣臨池云不宜直書直則無力立勢左偃而下狀若致刀折骨徐行適左而引勢或不用之宜不作躍蔡氏口傳曰頓筆先縮鋒驟努今頓下衄之其垂露懸針即衄之餘勢也躍勢四口訣曰傍鋒輕揭借勢之不徑筆不挫則意不深躍與挑一也鋒貴於澀出適期於倒收所謂欲挑一也鋒貴於澀出適期於倒收所謂欲挑而還置也筆訣曰即是努筆下殺筆躍起是也法須挫衄一云其法早回轉筆出鋒佇思消息之則神一作先蹤不墜矣䇿勢五口訣曰仰筆潛鋒以鱗勒之法揭腕一作躍勢於右潛鋒之要在盡勢暗捷歸於右也夫䇿筆仰鋒竪躍微徑借勢峻顧於掠也筆訣曰䇿者即永第五筆其法始築筆而仰䇿徐轉筆而成形依形以獲妙則逈爾而超群也掠勢六口訣曰撇過謂之掠借於䇿勢以輕駐鋒右揭其腕加以迅出勢旋於左法在澀而徑意欲暢而婉遲留則傷於緩滯庶疾之旁永木左出皆是也夫側鋒左出謂之掠筆訣曰掠者即永字第六從䇿筆下左出而鋒利下不墜則自然佳臨池訣曰右揭其腕借勢於䇿欲輕駐其鋒微曲其勢意須暢而不欲凝滯不掠則不美麗也啄勢七口訣曰左向之勢須盡為啄按筆蹲鋒潛蹙於右借勢收鋒迅直旋右須精嶮衄出去其緩滯曰鳥字頭斜皆是也夫筆鋒及紙為啄在潛徑而啄之筆訣曰啄者即是永字第七筆其法則側筆而速進徑硬若鐡石而不墜於斯為妙矣磔勢八口訣云右送之波皆名磔右揭其腕逐勢緊躍傍筆迅磔盡勢輕揭潛以暗收在徑迅得之夫磔法筆鋒須躍勢欲嶮而澀得勢而輕揭暗收存勢候其勢盡磔之筆訣曰磔者即是永字第八筆其法始入筆緊築而微仰便下徐行勢足以磔開其筆或藏鋒出鋒由心重鋒緩則其質肥宜以嶮澀而遒徑徐行勢足而後磔之藏鋒出鋒豈固必也翰林密論平磔法太宗挺生五代文物以盡之間天縱好古之性真造八法草書無對飛白入神一時公卿以上之所好遂悉學鍾王米芾書史高宗翰墨志曰書法必先學正書以八法皆偹不相附麗至側字亦可正讀不踰本體𨽻之餘風矣翰林禁經曰八法起於𨽻字之始自崔張鍾王傳授所用該於萬字墨道之最不可不明也隋僧智永發其旨趣授於虞祕監世南自兹傳授彰厥存焉李陽冰曰昔逸少工書遂厯多載十五年中偏攻永字以其八法之勢能通一切字也又筆訣云八法是翰墨之良規習書之源流無或輒廢法書苑蔡氏傳授凡十二訣永字第五側勒努躍䇿掠啄磔先賢口授不形紙墨張旭惟傳永字自後𢎞一切字法無不該矣密論書訣曰寸不過分撒不踰䇿鈎肩斂卷首足開合東含西湧左短右修宜頭開展罨口張機逸少永字學者易窺黃伯思論書曰昔人運筆側掠努躍皆有成規造微洞妙則出沒飛動神會意得然所謂成規者初未嘗失今世人作一波畫尚未知厯筆處徒規規強效古人縱成若印刻字耳唐自歐虞後能備八法者獨徐會稽與顔太師耳然會稽多肉太師多骨而此書尤姿媚可愛時人狀其書以為怒猊抉石渴驥奔泉余以為非是此山谷題徐浩碑後書季海題經後則又曰往時觀怒猊抉石渴驥奔泉之論茫然不知是何等語老年乃於季海書中見之山谷傳授蔡文姬傳云八法蔡雍授於神人而傳崔瑗及女文姬文姬傳鍾繇繇傳衛夫人衛夫人傳王羲之羲之傳獻之獻之傳外生羊欣欣傳王僧虔僧虔傳蕭子雲子雲傳僧智永智永傳虞世南世南授歐陽詢歐陽授陸柬之柬之授姪彥逺彥逺授張旭旭授李陽冰陽冰授徐浩顔真卿塢彤韋玩崔邈等凡二十三人蘭亭考卷四
