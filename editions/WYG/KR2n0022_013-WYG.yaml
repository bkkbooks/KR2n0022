front:
  text: 羣公帖䟦逵再拜蘭亭敘議論多所未見高宗學書説及米元章蘭亭敘樂毅論䟦録具别紙其他或尚有之未暇冥搜也澤卿彚次蘭亭考凡方冊所紀卷軸所題亦畧備矣其不可致者天上書耳秘閣藏唐人鈎摹幷鍾離景伯摹三軸皆有䟦語録以遺之南城曾漸書於道山堂㬇再拜蘭亭考已遍覽敬服該洽謹此納還蘭亭帖所共寶澤卿嗜古攷粹如此種學之功可以推矣碧環張從祖蠒紙入昭陵唐筆各名家世重定武本頗似聚訟字畫反不逮古何耶澤卿􅀈稡有條理可爲禊帖忠臣矣林至長廊睥睨來者誰出門解后渠得知不言使者求遺書只言浴蠒當及時從容與語益欵洽論到翰墨尤瓌奇山僧技癢不自禁稍出修禊蘭亭詞啟函展玩未及竟袖有黄紙天庭追口呿氣裭僵欲死一騎趣向咸陽馳虬鬚天子喜折屐詔許兩禁同觀之龍騰鳯集在御榻平生觸眼何曾窺自從蠒紙歸昭陵寶氣夜夜光陸離千年議論經幾手極力追倣分毫釐博聞強識子桑子上下纂輯無或遺清臞不滿六尺長中有文字無津涯歸君此編忽自笑山東學究真黠兒而今御史還書癡澤卿示蘭亭考作蕭翼取蘭亭辭豫章王疇若開禧丁卯臘月六日還澤卿蘭亭考古括葉時書法光芒晉永和後來摹寫不勝多考論又得桑夫子蘭渚風流轉不磨自從蠒紙殉昭陵定武流傳賸得名總輯舊聞爲博議卽今真贋尚難慿予從事越府修圖志因裒蘭亭題詠及諸賢所評禊帖為一編以俟澤卿庶有補蘭亭考李兼孟達書戊辰元巳前二日禊序之傳歌詩序䟦不知其幾愈出愈新贊揚不盡澤卿又從而集之後之作者殆未巳也嘗記本長老赴闕時過金山佛印見其朴野强使賦詩仍誦唐人以來佳句本忽使人代書云水裏有塊石石上有個字千人萬人題只是這箇事印深服之余輙用其語曰定州有片石石上幾行字千人萬人題只是這箇事可以發好事者一笑樓鑰澤卿徃越欲以所編蘭亭書歸帥黄公仍見三山舅氏送以二絶鑰蘭亭禊序幾臨摹曾稡工夫十載餘擕過會稽尋古跡不妨呈似老尚書四海詩名陸放翁晚成嘉遯萬縁空慿君問信今安否欲向溪頭共釣篷澤卿蘭亭考用工深矣擕攻媿大參詩見訪次韻倂呈放翁侍御
