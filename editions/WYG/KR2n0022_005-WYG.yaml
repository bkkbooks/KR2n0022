body:
  text: 蘭亭考卷五宋桑世昌撰臨摹唐太宗於右軍書特留睿賞貞觀初下詔求詢殆盡蘭亭樂毅尤所寳重令湯普徹等搨賜梁公房𤣥齡已下八人普徹竊出在外傳之及晏駕入元宮蘭亭搨本人間徃徃有之多非好蹟天禧中相國僧元靄曾進唐勒石本一卷卷尾文皇署勅字傍勒僧權二字體法既臻鐫刻尤工元靄工冩貌善状人情態至於煎調染冩亦出天性時莫有繼者今太祖太宗御容即其筆也參政蘇易簡家摹本蘭亭墨彩鮮濃紙色微紫盖名手傳搨也隋智永亦臨冩刻石間以章草雖功用不倫粗彷彿其勢本亦稀絶唐陸柬之臨冩蘭亭五詩后有二行云吾所噉日去不復觧此意想足下月必顧之遲遲羲之頓首司議蘭亭此帖尤麗結裹圓轉趣媚不窮復題司議蘭亭帖一行後有䟦云天復二年九月三日盧家阿姑遺其月二十九日夜記年十五唐陸元方傳伯父柬之善書官太子司議郎太宗時人所謂歐虞禇陸者昨日觀蘭亭詩固知是柬之書已嘗言之矣後題司議益不疑也此世無有請寳之敏求上文玉家藏此帖云陸柬之書次道能筆法僕信然如帖尾羲之字恐是一手臨書耳仲冬九日雪中過文玉陳繹和叔題郇國公觀元豐七年二月初七日尚書省題觀蘭亭五言江右風流蕭然在目筆迹古雅亦在二王然少雜竒嶮豈陸君所摹耶博陵用吉得之盧家阿姑非大姓故家莫能有此也元豐八年二月十二日眉陽蘇軾書是年十一月十八日轍過泗州嘗觀陸柬之時工臨冩今校理錢延年有柬之書蘭亭用緑麻紙押尾署陸司議書雖外露毛骨而雅有風氣東之吳郡人官至太子司議郎虞世南之甥張懷瓘云少師世南臨冩所合亦猶張翼換羲之之表奏蔡邕為平子之后身魏正始中務談𤣥勝及晋渡江尤宗佛理故郭純始合道家之言而韻之孫興公許元度轉相祖尚又加以三世之辭而詩騷之體盡矣今山隂脩禊諸賢詩體正爾然皆寄尚蕭逺軼迹塵外使人懷者可存見晋人一帖云三月詩文既佳興趣高覽之增諸懷年少作各有心正謂此詩也是時與集者四十有一人今存者二十有六而已此卷雖唐人書故自不凡亦可珍録政和元年十一月戊寅觀於右軍樾舘黄伯思䟦唐人書蘭亭詩后劉秦妺善臨蘭亭及西安帖奪真亦唐翰林書人並法書苑蘭亭樂毅東方先生三帖皆妙絶雖摹冩屡傳猶有昔人用筆意比之遺教經則有間矣東坡䟦官本法帖蠟本䨇鈎之法世皆不傳惟唐翰林院所摹帖中用之此蘭亭蓋當時搨賜侍臣者卷首尾三印曰賜書翰林院文字延資庫之印又有一時官吏署衘名其詳審如此决不失真矣嘉祐元年正月望莆田蔡㐮題唐搨賜本曲水序世謂之蘭亭嘗觀搨本秘閣一本蘇才翁周越一本此外無繼者晚於王公和處得石本絶有意思先臨一本為馮當世持去吾眼目益昏不可多得也嘉祐癸卯五月二十八日臨本與諫奴題搨本按此本前有書縫人名三异句章令滿騫僧後有批云乾符元年三月延資庫使内侍省都知臣裴綰承詔出晋王羲之蘭亭宣示仍模蠟本以賜在讌人各一紙翰林待詔王孝宗諱言㸃檢入内内侍省茶藥待詔臣鄧元批上局官檢校金紫光禄大夫兼右散騎常侍兼管勾文字臣爰源宣行翰林待詔臣元欽等上自乾符至各一紙行草與都待詔各衘字畫大小一同當是其筆也但此本雖有一骨力而殊失體製豈一時亟於分賜然亦不應如許踈也昔周越謂搨本人間徃徃有之多非好跡蓋此類也右軍自言見秦篆及漢石經正書書乃大進故知局促轅下者不知輪扁斵輪有不傳之妙王氏以來惟顔魯公楊少師得蘭亭用筆意山谷題范氏摹本王右軍禊事詩序為古今行正之祖當時逸少自珍此書故作或肥或瘦不同要其書法異爾今之書或喜肥疾瘦殆不知而作也予近於今之李翹叟家得硬黄臨文賦一卷筆意清潤是歐虞禇陸軰臨右軍書使善工者入石可與蘭亭並行但世人未深知爾建中靖國元年四月庚申荆江亭書是日江水漲數尺山谷䟦周紹邃本蘭亭叙草右軍平生得意書也反復觀之略無一字一筆不可人意撫冩或失之肥瘦亦自成妍要各存之以心㑹其妙處爾並山谷蘇耆家蘭亭三本一是參政蘇易簡題贊贊見后同第二本在蘇舜元房上有易簡子耆天聖嵗䟦范文正王堯臣參政䟦云才翁東齋書嘗盡鑑焉余與蘇泊才翁子友善以王維霧景六幅李王翎毛一軸徐熈棃花大折枝易得毫髪備盡此定是馮承素湯普徹韓道政趙模諸葛正之流搨賜王公者碾花真玊軸紫錦装背在蘇氏舜元房題為褚遂良摹余䟦曰樂毅論正書第一此乃行書第一也觀其改誤字多率意為之咸有禇體餘皆盡妙此書下真蹟一等非知書者未易到也贊見后第三本唐粉䗶紙摹在舜欽房第二本所論數字精妙處此本咸不及然固在第一本上也其族人所摹是第二毫髪不差世當有十餘本一絹本在蒋長源處一紙本在其子之文處是舜欽本一本在滕中處是歸余家本本朝㕘知政事蘓太簡所藏丙寅嵗得於集賢國老孫秘閣子美子志東志東好事與予家通書畫上著邳公之後蘇氏字印太簡被太宗遇使第諸國簿收書畫為三等賜予甚多公卿之家無出其右此其尤著名者紹聖中重装翰林蔡元長既䟦印以今翰林印副車王晋卿剪下元長所䟦著他書軸乃見還其上故印存焉元符之元漣漪瑞墨堂題泗州南山杜氏父為尚書郎家世杜陵人收唐刻板本蘭亭與吾家所收不差有鋒勢筆活余得之以其本刻板面視定本及近世妄刻之本異也此書不亡於后世者頼此本遇好事者求即與一本再不可得也世謂之三米蘭亭盱眙南山杜寳臣字器之父為令祖皆為郎家世傳此唐刻本蘭亭余與二子五日模視善工十日刻世謂三米蘭亭出於世也杜欲百夲而以此見歸乃好事欲廣其真耳壬午五月西山寳晋齋手装是嵗既得上皇山洞天一品食甘露降林木竹石嵗也汪氏所藏三米夲有䟦云泗南山杜器之祖收唐刻本蘭亭叙以家藏蘇太簡中令所收貞觀模賜王公本一同建中靖國元年淮山樓以杜本刻以貽有識米芾樂毅論正書第一此固行書第一定本懷仁模思差拙此本轉摺精彩殆王承規模也米尹仁書此書在世八百年定本傳世四百年而亡後世之傳實在此本米尹知記二尹後改作友程師孟語余四十千置得古摹蘭亭一本白玉軸欲出示竟不曾取今在子宏處王安上曾見之王文惠孫居高郵收遂良黄絹上臨蘭亭許以五十千質之余方㐮大事為沈存中借去拊髀驚曰書不復歸矣遂過沈問焉沈曰且勿驚得之當易公王維雪圖因不復言數日王君携禇書見過大歡曰沈使其婿以二十星資其行亦不復取泗南山杜寳臣字器之祖兩世為郎父為令家傳唐模印本與購於蘇太簡家貞觀名手䨇鈎本微有出入吾行年六十閲書一世未之見也父子三人逐字撫於第一軒命工十日刻成世謂三米蘭亭此其祖也丹陽郡甘露降吾家西山書院梧桐之嵗崇寧壬午五月十七日寳晋齋致爽手製㐮陽米芾元章秘玩御府帖唐中書令河南公禇遂良字登善臨晋右將軍王羲之蘭亭宴集序黄素兩幅至欣字合縫用証摹本僧字果徐僧權書縫也雖臨王書全是禇法其状若岧岧竒峰之俊英英穠秀之華翩翩自得如飛舉之仙爽爽孤騫類逸羣之鶴蕙芳振和風之麗一作靡霧露擢秋幹之鮮蕭蕭慶雲之映霄矯矯龍章之動彩九奏萬舞鵷鷺充庭鏘玉鳴璫窈窕合度宜其拜章帝所留賞羣玉也至於永和字全呈其雅韻九觴字備著於真標浪字無異於書名由字蓋彰其楷則若夫臨倣莫推於魏薛賞别不聞於歐虞信百代之秀規一時之清鑑也本朝丞相王文惠公故物辛未嵗見於晁美叔齋舫云借自公孫辛巳嵗購於公孫瓛四月二十二日寳晋齋舫手装詳見審定門遂良摹本逸少神寓之蹟也唐文皇帝甘心學之贊曰烟飛霧結状欲斷而還連鳳翥龍盤勢如邪而反直頗為能状之此永和九年書也十二年為山隂道士冩黄庭經又作意移入楷法故於㸃曵裁成之妙亦為正書之冠唐之學者心慕手追輔成已能流而為歐虞禇薛故後人但見定武石刻為工今遇此本方真元乃褚河南親摹以傳頓覺定本尚類唐臨去此絶逺何則柔閑蕭散而神韻獨高華巧天就如運斤成風而中桑林之舞乃知妙絶千古者不在㸃畫畦畛間而風流天韻非力學所可到舍此本疇能見之紹聖丙子李公麟伯時書貞觀中得蘭亭上命供奉搨書人趙模韓道政馮承素諸葛貞等各搨數本分賜皇太子諸王近臣而一時能書如歐虞禇陸軰人皆臨搨相尚故蘭亭刻石最多嘗有類今所傳者參訂獨定州本為佳似是鎸以當時所臨本模勒其位置近類歐陽詢疑詢筆也此石已為薛向取去見在向家而定州石刻又從而傳模者然亦不能辨真偽若諦觀錙銖則較然逺矣此乃向家本也姑溪李之儀䟦薛氏本唐粉䗶紙䨇鈎撫蘭亭燕集叙本在蘇轍處精神筆力毫髪畢備下真蹟一等此幾馮承素軰搨賜大臣者舜欽父集賢校理耆購於蜀僧元靄芾與轍友善每過從必一出遂親為背餙又蘭亭模本正議大夫張犯光宗諱䟦蘇轍云此與吾家所收同寶章待訪集唐太宗得蘭亭命馮承素諸葛貞之流䨇鈎模賜左右大臣昨見一本於蘇國老家后有褚遂良檢校字世傳石刻諸好事家極多悉以定本為冠此蓋是也友仁書一本墨跡後題賜元嘉異僧權開皇十八年三月二十日右䟦有四一云太宗所賜韓王搨本蘭亭褉序當時詔搨書人趙模韓道政等各搨數本皆有少異至有筆法全不類者惟其間一本無異真蹟乃勅侍臣所臨擇諸王之賢者賜之其珍秘如此觀此筆力遒勁非搨書人可到以韓王之文藝超絶出一時名流之右圖書珍玩甲於天下若非禇魏陶虞所書亦必不錫予之也真蹟人間不復見此為最善本謹當什襲藏之耳開元丁巳朝議郎守秘書監兼校定四部圖書臣崔液恭題其二云善法書者各得右軍之一體若虞世南得其美韻而失其俊邁歐陽詢得其力而失其温秀禇遂良得其意而失於變化薛稷得其清而失於僒拘顔真卿得其筋而失於粗魯柳公權得其骨而失於生獷徐浩得其肉而失於俗李邕得其氣而失於體格張旭得其法而失於狂獨獻之俱得之而失於驚急無藴藉態度此厯代寳之為訓所以夐高千古柔兆執徐暮春之初清輝西閣因觀脩禊叙為張洎評此其三云江南後主書故吏鉉識其四云右唐文皇賜本蘭亭先光禄秘藏於今逾百嵗矣本得之於薛氏書府紹興庚申七夕重加装裭穎川史應物純夫題已上係四明李元泊少裴所藏墨跡蘭亭衆䟦唐文皇賜韓王有崔潤甫之題為可考若李重撥證書㫁然無能效之者為真筆何疑朱徐開皇之記則已見少裴之辨開元貞觀未逺潤甫又職校定四部圖書以為最善本辯才之本既殉昭陵今世以定武本為第一又出歐陽率更所臨石本自應在墨跡之下則知此本信為冠絶蓋希代之寳也然考之新舊唐史崔湜弟液滌及從兄涖並有文翰居清要液至殿中侍御史液弟滌明皇用為秘書監出入禁中後賜名澄如此則液為湜之親弟而為秘書監者滌也又宰相世系表博陵安平崔氏仁師相太宗髙宗次子擢之子液吏部員外郎第四子挹之子湜相中宗湜之弟滌秘書監如此則液為湜之從弟又不為秘書監傳之與表已自不同而液之親筆乃爾以是知作史與考古之難也因并述之仍賦長句以副少裴好古之意樓鑰䟦李氏所藏墨跡署名其上又有開皇之號以為梁隋以來厯代所寳藏在秘府以賜元嘉三字為文皇親筆崔秘監别用白綾小幅書其所䟦後主與張泊評書於清輝閣觀脩禊叙用撥證法徐鉉被命得以故吏識名於其后且引金坡遺事謂翰苑所藏江南圖畫五十軸至景德中正存雨村牧牛圖等三軸此軸當於是時散落人間故史應物謂其家藏已百餘嵗初蓋得於薛氏自是一傳而歸奉使高公直閣家六十餘載再傳而歸一權貴之室三傳而歸少裴凡此皆所當紀若崔秘監出處史氏失於考䆒則已見攻媿樓公之䟦世昌書臨川寓居勾幼安之父酷好石刻嘗撫一本云寳應寺乃顔魯公故宅殿後有謝靈運翻經臺臺頺毁於基土中得蘭亭石刻一段勾公得而寳藏之魯公臨摹蓋有自矣樵隐夜話司業汪氏所藏唐人臨本有四其一絹素本蘇太簡璠字韻詩真跡繋衘其後云翰林學士承旨中書舎人蘇某於玉堂北軒題繼而䟦者皆一時聞人京兆章犯光宗諱觀洛陽富弼觀嘉祐丁酉仲夏晦日正甫過訪東齋因得請觀丹陽邵亢興宗題范純禮彛叟觀持國玉汝至和元年七月十一日賜書閤下同觀近有以唐人臨寫一軸相高下如魯衛也公擇書李尚書也蘇易簡題蘭亭軸詩以其官攷之當在淳化二三年或四年中距今淳熈五年十月殆一百九十年翰林學士周必大題於行在玉堂之東軒唐文皇旣得脩禊叙命趙模諸葛貞軰臨寫當時在廷之臣競相傳模故流傳於世者皆可寳蘇太令自言家有五本今不知此是第幾本也梁谿尤袤蘇富韓范諸鉅公題䟦所謂羣賢畢至者政豈能望此帖後人物萬一耶淳熙壬寅正月第一本叙第一行下有墨妙筆精印又叙后蘇題字前合縫有國老印司業汪逵家藏褉叙至多内一軸首䟦乃康伯可是轉模失真耳此本良是定武古本但定武世以斷損帶流右天四字為真而此獨完好然精彩乃與唐人鈎摹本不異殆是定武以前未斷損者耶乾道壬辰中秋日錫山尤袤䟦右蘭亭從毛雍玉堂人所臨本上䨇鈎摹寫亡兄無悔昔與雍玉相遇於汝州教授陳和夫官舍大熱揮汗自旦至暮極其精思較他本為勝敦儒後三十年見雍玉之壻黄君再見此本䟦尾皆是而蘭亭舊物非矣覽之慨然壬戌八月㑹稽紹興丙寅十月晦日㑹稽憲司見張季章所得李文定家二本馮逹道所得東都晁美叔家四本并余家所收石本摹本共十本較之亦各有長短要是皆失真逺矣遐想昭陵埋没至寳使人慨歎世間幻那得不變滅耶第二本係朱無悔摹唐人本余舊所得蘭亭數本皆不及定刻然猶意定刻嶄削無優游之意此本以為過定本逺甚因病欲寫之未能也元豐五年七月十三日無咎記坐中師道希孝無斁徽之時過甘陵元豐五年八月十五日番陽劉定觀予家收蘭亭石本天下竒物有模本一紙亦類此京題癸亥六月旦馮宣徽也子淵熈寧初提舉京東常平時歐公守青嘗出蘭亭石刻四本相示惟定刻最佳模者始見此本於北京元豐六年六月十九日王子淵題右蘭亭洛陽楊景範所藏楊君多法書米元章最愛之與其子微之相繼死其妻李西臺孫子丘㛐也故得此書馮當世晁無咎諸公有䟦尾妙處頗勝石本朱希真記紹興十六年十一月七日乙夜展閲時借得石本六并予家摹二石參較各有所長要之失真逺矣昭陵埋没可勝嘆耶時雨雪寒甚書於官舍和樂堂希眞六十六已為請宮祠計欲歸老浙西第三本第四本無䟦語前有蘇氏朱印第一行下有墨妙筆精印中間合縫有許國后裔謂蘇許公又蘇氏印又内殿秘書之印末有向子固印又紹興二字御寳蘭亭為王晋卿家物背有涯字小印是唐王涯多蓄古圖書遭難散失所見殆是耶戴溪范文度摹本石刻有諸名人䟦云右軍蘭亭最者今世上有搨本秘閣一本蘇才翁一本周越一本猶有氣象存焉今觀撫倣蓋得之矣嘉祐壬寅五月二十六日莆陽蔡襄㫋蒙單閼厲陬壬戌晦涑水司馬光公實觀熈寧丙辰七月六日公著觀治平四年九月二十四日太原王珪史院題范君隐徳不耀以藝文稱於西州舊矣楹中得蘭亭摹本雖嵗乆而筆畫如新體法秀整誠世學之家子孫寳之不墜也熈寧初元正月四日觀臨洺宋敏求清源呂夏卿襄國陳荐河南陳繹熈寧辛亥九月一日寛夫題世傳蘭亭諸本惟定州石刻最善近聞此石已取入禁中不可復得則此本尤當貴重也蘇軾題轍同觀右按此石刻本前有云上巳日蘭亭曲水叙晋右將軍王羲之文并書古本注崇山二字國者乎三字正文三百二十四字元無題目名衘今加之代郡范文度書歐公為范作三䟦其二見前若云書雖列於六藝也蔡君謨以書名當世其稱范君者如此不為誤矣滁山醉翁題此刻旡之温公嘗字公實乃見於此云此帖見藏新安汪書家帖后隋所録附見下方尤裒邱崈王藺章良能黄疇若婁機並有曾觀題字熈寧丙辰七月六日呂公著觀絳覽范文度書真本體法勁秀想見其人欽歎愛玩不能自止元豐壬戌嵗仲冬二十日穎川韓絳子華題蘭亭品佳而後題小字勁秀可愛信古今之不乏人也維持國后三日題非知書者一觀闕二字范闕一字之書惟歎服自失耳元豐乙丑嵗穎昌許公堂題右得之余襄亦為范文度臨本著語者其六䟦已見前列此段則無之所謂寛夫者文潞公也用劍南西川節度使之印絳者韓康公也永者孫曼叔也世昌書秘閣三本唐人所臨其一題云唐人鈎摹蘭亭前后有五老小篆印三建昌李公擇記篆印一平原開國大方印四真定府印一山房所藏蘭亭三於臨搨之間互有得失政和二年十月三日儀真鑑逺題夷曠家藏三本皆唐人所臨今世所未有然自有優劣此本當為第一大觀元年二月初九日同錢遜叔觀於晁進道㕔事䖍化孫仲和父題評書者以右軍字為龍跳天門虎臥鳳闕孫志康謂山房所藏自有優劣此本其三友之管寧最怒之偉節歟遜叔唐人書世字必諱此獨否何耶豈隋末唐初善書者所臨邪何其神妙也後三百四十日借觀於無為酒局直舍之方丈趙不佞張紘晏諶政和丙申六月二十五日同觀一題云鍾離景伯本鍾離公序翰墨為時所稱亦前軰中潛心不倦未易䟦及臨學蘭亭脩禊序古勁有體今已難得好竒博識當知珍藏之也襄陽米友仁元暉獲觀一題云唐模本太宗嗜右軍帖逮亡寢食此帖傳流本末世詳之甚詳彦逺云當時勅虞世南軰各臨十餘本分賜近屬後來諸公亦各臨書唐世為多今所傳者悉此也觀之大校皆得之一二而體終不變各自成家有足騐者其遺法餘美已足可驚後世區區有所不及者又况昭陵玉匣之跡哉不然以太宗之明尚附耳求之耶昔年侍先子官江東見吳瑛家禇遂良一本近定武石上柳公權一本憲守李球舊石一本此書皇祐中張侍中耆宅得之舊不著所書姓氏云亦康定間賜帖其運筆精審圓潤老熟畧有虞法云白馬馮惟寅評後有空同子紀方篆印余家藏舊唐賢墨跡甚多自經兵火散失殆盡此誠予家之舊物也紹聖改元十月晦日鄧襄題嘗見唐人模蘭亭本於蘇才翁家體若淳重而清麗似不及也元祐丁卯四月馮瑊題張彦逺謂太宗問高宗求蘭亭記其後高宗果以玉匣納諸昭陵若然死者其真有知哉熈寧乙卯南邠張舜民蘭亭體類此者宜近真考之於當時集書者乃可見薛紹彭題洧嘗觀石本蘭亭愛晋賢之筆今又於思中處得見唐人所臨使予無恨矣熈寧八年十一月曝背大河之濵因書乃二十七日也孫鰲抃才父元祐丁卯四月十二日觀於上黨馹舍後有劉氏書畫楚孫秀印二方印洙獲觀汝南延雋嘗觀梁國虞王廷老伯􅆒曾覽號國楊康仲祥嘗閲守文安郡事馮文憲因閲此書於中和堂之北軒時嘉祐癸卯初伏日題后有文顯一篆印逸少蘭亭書臨倣之者頗多此本最佳李唐卿題劉師𢎞子明閲自逸至閲作篆書太原文叔觀華陽李大臨才元題秦玠閲過丹陽邵亢嘗觀壬辰二月七日蘭亭無復真本獨虞世南軰所臨散在天下然竒者蓋鮮獨蘇才翁家所收為第一而葛藴仲諶所藏一本次之與此本共為三本無與比者仲諶之本今歸予矣時熈寧二年春二月四夕謝恍題蒲津員蜕介山郭維基同觀狄道李戭河東薛昌朝題崔復元曾看上下有思中篆印二又有楚孫秀印一方篆蘭亭之書逸少之絶筆也得見摹本固可愛重耳㑹稽鍾離公序題熈寧二年二月二十五日後有楚孫秀印一方篆印薛昌樓景脩乙卯孟春二十六日觀蘭亭唐人所臨甚竒㑹稽錢穆觀介觀甲寅六月二十九日熈寧丙辰嵗四月番陽劉定觀熈寧丙辰十月上旬杜陵崔弇觀後有楚孫秀印一方印右軍真本葬昭陵唐末之亂為温韜所發所藏書畫皆取其装軸金玉而棄之於是魏晋以來諸賢墨跡遂流落於人間此本乃唐諸家所臨今亦罕得見也丁丑中秋榮老堂䟦開封樊伯逵君錫彦和伯充大年永年應之漢輔深道崇寧元年閏六月四日廣慈觀唐代能書者徃徃得晋人筆法於此可見矣紹興壬子夏四月二十九日魏佾記近見唐人模本於曹忠靖家䟦云唐模本家藏乆矣因重装背延雋唐模本蘭亭世所無有當寳之敏求題王安上觀斯言信然禊事文所收石本模本至七軸未始有同者然求其意可見其真嘗於王仲儀家見一本亦云出於周氏其㸃畫微細瘦不若此書有精神也襄題熈寧戊申吳中復嘗覽陟觀潁川孫永丹陽卲亢觀熈寧甲寅三月癸亥蘭亭本最多此本誠佳庚午九月二十六日蒋之竒蘭亭摹本似此者幾希矣仲求題芾薛師雄南譙秦玠觀乙酉閏四月望日題舊見蘭亭書鋒鋩者與所傳石本不類世多疑之嘗以唐人集右軍書校之則出鋒宜為近真蓋石本漫滅不類其初也辛未五月旦日薛紹彭書曽孫復嘗以一本遺世昌故詳及其䟦云余始得蔡君謨字二紙恨不見所䟦唐搨賜蘭亭本可稽始末越數年僚友石德興見之愕然曰吾家有此二本而無蔡䟦乃遺余析而復㑹其有數耶紹興辛亥余守㑹稽刻之郡齋重陽前二日括蒼王信黄伯思云世人多不曉臨摹之别臨謂以紙在古帖旁觀其形勢而學之若臨淵之臨故謂之臨摹謂以薄紙覆古帖上隨其細大而搨之若摹畫之摹故謂之摹又有以厚紙覆帖上就明牖景而摹之謂之響搨焉臨之與摹二者逈殊不可亂也筆誤云世之摹字者多為筆勢牽制失其舊跡須横摹之茫然不問其㸃畫惟舊跡是循然後盡其妙也蘭亭考卷五
