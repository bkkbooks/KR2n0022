body:
  text: 蘭亭考卷九宋桑世昌撰法習右軍之書代多稱習可據爲宗匠取立指歸豈惟會古通今亦乃情深調合至使摹搨日廣硏習歲滋先後著名多從散落厯代孤紹非其效歟試言其由畧陳數意止如樂毅論黃庭經東方朔畫贊太師箴蘭亭集敘告誓文並代俗所傳眞得絶致者也寫樂毅則情多怫鬰書畫贊則意涉瓌奇黃庭經則怡懌虛無太師箴又縱橫奇折曁乎蘭亭興集思逸神超私門戒誓情拘意慘所謂涉樂方笑言哀已歎豈惟注想流波將貽嘽喛之奏馳神睢渙方思藻繪之文雖其目撃道存尚或心迷議舛莫不强名爲體共習分區豈知情動形言取會風騷之意陽舒陰慘本乎天地之心孫過庭書譜褚遂良正行全法右軍洛都袁氏家遂良書帝京篇一卷體裁用筆竊效蘭亭法書苑一本云今司徒王欽若山谷遊荆州得古本蘭亭愛玩不去手因悟古人用筆意作小楷日進曰他日當有知我者山谷家傳有云公楷法姸媚自成一家餘與此同東坡道人少日學蘭亭故其書姿媚似徐季海至酒酣放浪意忘工拙字特瘦勁乃似柳誠懸中歲喜學顔魯公楊風子書其合處不减李北海至於筆圓而韻勝挾以文章妙天下忠義冠日月之氣本朝善書自當推爲第一數百年後必有知余此論者東坡墨跡後王著臨蘭亭敘樂毅論補永禪師周散騎千字皆絶妙同時極善用筆使胸中有書數千卷不隨世碌碌則書不病韻自勝李西臺林和靜蓋美而病韻者王著勁而病韻者周越皆渠儂胸次之罪非學者不盡功也顔太史稱張長史雖姿性顚佚而書法極入規矩也故能以此終其身而名後世如京洛間人傳摹狂怪字不入右軍父子繩墨者皆非長史筆跡也蓋草書法壞於亞栖也周子發帖古人作蘭亭敘孔子廟堂碑皆作一淡墨本蓋見古人用筆廻腕餘勢若深墨本但得筆中意耳今人但見深墨本收書鋒鋩故以舊筆臨倣不知前輩書初亦有鋒鍔此不傳之妙也淡墨硏鋒子瞻少時學蘭亭極遒媚中年以來筆墨重實李北海未足多也東坡書今時學蘭亭者不師其筆意便作行勢正如羡西子捧心而不自悟其醜也余嘗觀漢時石刻篆隷頗得楷法後生若以余說學蘭亭當得之元祐六年十月丙子阻風於蕪湖縣徑行到吉祥寺魯直題王氏書法以爲如錐畫沙如印印泥蓋言鋒藏筆中意在筆前爾承學之人更用蘭亭永字以開字中眼目能使學家多拘忌成一種俗氣要之右軍二言羣言之長也䟦絳帖東坡云大字難於結宻而無間小字難於寛綽而有餘寛綽而有餘如東方朔畫像贊樂毅論蘭亭禊事詩序先秦古器科斗文字結宻而無間如焦山崩崖瘞鶴銘永州磨崖中興頌李斯嶧山刻秦始王及二世皇帝詔近臣兼二美如楊少師之正書行草徐常侍之小篆此雖難爲俗學者言要歸畢竟如此如人眩時五色無主及其神澄氣定靑黃皂白亦自粲然學書時時臨摹可得形似大要多取古書細看令入神乃到妙處惟用心不雜乃是入神要路已上山谷一本云東坡云云此確論也予嘗申之曰結宻無間瘞鶴銘近之寛綽而有餘蘭亭近之已上山谷蘭亭考卷九
