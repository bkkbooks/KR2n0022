body:
  text: 蘭亭考卷十一宋桑世昌撰傳刻御府一本紹興元年秋八月十四日刋定武本後有寶字方印及御製跋一本㑹字全不界行斯文下有貞觀單印上角微圓末篆書題貞觀石刻紹興乙卯重刋已上二本又見紹興淳熙雜法帖內一本闕在癸丑會稽山陰之蘭亭修長此林修竹又有淸流激天共二十一字有紹興雙印一本領字有山字會字全無界行有紹興雙印一本會稽下闕山字蛟篆紹興雙印定武一本天字小損其字瘦徑一本天字全字肥此疑莫古本一本鑱損湍流帶右天五字一本崇山字中斷第六第七第八三行破裂無絲竹管弦之一觴一詠亦足以是日也十六字榮芑云定武修城役夫所得後歸康惟章家一本棗木刻五字不損王順伯所類本內一本亭列幽盛遊古不羣殊九字不全右今士大夫所藏本未易殫紀其詳有已見於審定卷者不復重出特舉其槩爾會稽一本辛道宗跋云宣和庚子冬被命平二浙賦明年夏剡溪掃殘孽還訪蘭亭遺跡於天章寺是時兵火初絶盡為荆棘瓦礫之場王謝風流惟山川在爾徘徊四顧為之歎息求於越人得舊修禊敘筆畫失真意謂當有來者能求佳本刻之林下後十年建炎庚戌歲扈蹕再至雖舊寺棟宇已成而所期未副矧山陰無蘭亭帖豈非是邦闕遺也遂以唐臨本刻石卷有太上皇帝宸翰係是徽廟御書唐賢所臨蘭亭六字以御寶印其上鑑賞後則蔡襄君謨宋敏求次道一時名公題字又曰延雋者周仲章也安惠公起之子膳部外郎越姪也其家圖書為當時第一此本淵源固有自也曰大防呂汲公也曰涉爰世弼也曰尋劉執中也曰洙孫臣源也曰彥先許覺之也曰仲來豫章李定也因並刻之石以遺山中僧庶幾少補訪古幽討之士攬觀云紹興改元五月甲午又紹興元年車駕駐會稽正月十二日會宰屬官於政事堂之别㕔時辛道宗為樞密都承旨出所藏唐人臨本蘭亭云出內府毗陵張守金陵李回洛陽富直柔襄陽范宗尹同觀或云辛道宗所刻不存闕雖當其欣於已快然自足不知將至所之既倦情隨事等字又第五字有察字一刻蠟紙本有少長咸欣俯仰之間以為陳迹猶不十四字雙鉤不填後題乾符元年三月詳見臨摹本一本後有僧權署字係題開寶十八年三月二十日洛陽一本不痛哉若合一契兩行之間甚濶止無會字邯鄲余嘗見此本於表姪陸寓處淸徑可愛自第一行至第十七行下皆損一字移注於其上後跋云定武蘭亭真本今已不知所在操有家藏者因官邯鄲乃摹於石以廣其傳大宋元祐四年張操益仲婺女一本在停㕔自第十三行至末橫裂而上又自二十八行後自裂處五行詢之耆老云其石碎已百年王自牧家有未經刓闕時本庶幾定武典型也一本自南澗家一本褚遂良貞觀八年所模敘首無永字雖古而未盡善也豫章一本前有忠孝之家方印後題唐貞觀中石本後六印作一行錢形忠孝之家印黃扉珍玩又三印字不可辨末同前方印一本在法帖內第十十一十二十三行有橫裂文一修城所得本前有薛稷書義寶過盈尺參神明以長生􅂒以曜物得麒麟兩行十八字後髙宗皇帝取石入德壽宮今此兩行鼎帖中刋在薛稷書內又王仲信跋云此本得於西霞老道士云長安政和中修故宫掘地得此石其精神鋒鋩在真定本上七閩刻貞觀本與豫章同前有忠孝之家方印後亦同前六印但第五印在後行下有漢北平守世家印印後方題唐貞觀中石本括蒼三本會字全有界行後題模家本留刻仙都紹聖丁丑蜀人劉涇金陵一本熙寧丁巳六月二十七日省局手裝堯民志後跋云蘭亭石刻世以定武為最先公熙寧間得此本志而藏之逮今七十有一年懼歲久手澤濕漫並刻於建鄴府治紹興丁卯十一月旦淸豐朝謹之謹題上饒一汪氏本刻同豫章自第十至十四行橫裂後有汪德輝忠衛社稷之家一印景陵一本自第一行首至第七行末裂文甚大乃景陵郡齊舊物湮沒民間日久郡守何文度得之紹興丁丑歲十月十有二日跋九江一本自第五行首至九行末有大裂文龍舒一本刻褚書有篆額蘭亭記作長行後有黃扉珍玩印忠孝之家圓方兩印題貞觀八年褚遂良摹八桂一本用米寶晉本開後有米氏印記永嘉一本字大行濶並刻乾卦二年懷仁集右軍及序有秦吳三跋丹邱本一前有薛稷篆十八行字者見存彭漕家云得之淘河之夫常德一本乾道間所刻具三體仍載坡谷諸跋在其後有殺胡林一事尤佳臨川一掘出麻姑石本列坐盛是日六七八三行裂損十九字一本無會字及界行後有玉冊官楊仙芝模刻八小字周安惠家本此本見存秀邸有曾伋彥思跋曾得於越之姪衍及大觀己丑歲也紹興癸酉重加表飾巳四年陳氏本簡齊用池紙臨中闕痛字高宗所賜臨本亦然似是御本寫也三米本米氏父子模刻於淮山樓杵本因斸地而得者有納竅初號杵蘭亭後易為褚陶氏本陶憲定字安世多藏秦漢以來古物有定武本諸葛氏本字極大恐是别本模錢氏本前後凡七印有文僖公手書唐貞觀中石本六字紹興癸酉夏六月元孫傑之刻中山王氏本此本前瘦後肥體畫溫潤有典型後列六印亦佳吳氏本斯文下有吳璜書印尤氏本遂初尚書用楊伯時本刻劉氏本字極大無言所刻會字全餘皆不闕范氏本修禊帖用定武墨本重摹入石紹興十六年八月戊申方城范序辰識邵武本後有勳字圓印政和乙未暮秋望重刻定武古本陽羡郡勳記陵柬之本王氏金石録云五言蘭亭詩二十四行而蘭亭只類重刻鑱本又有陳和叔郇國公東坡子由跋見審定門潘氏本在安吉縣第二十及二十一兩行裂失無期於昔人之懷七字石氏本石熙明家有二唐硬黃本薛紹彭勒唐搨本第十四行僧字上有察字且有鋒鋩又淸門堂本後有紹彭二字織本松窗雜録載元宗先天時所有異物如雷公鎖辟塵犀簪暖金之類凡十有三西蜀織成蘭亭敘是其一也殘石本此得之殘闕之餘仍作二塊前一塊有悲夫雖殊事一也後之攬文共十一字下有小字云蘇氏太簡後一塊復裂為二字已漫滅但倣佛先世名玩文五字可辨南嶽本一本後有定武仍孫伯傑六字篆印章氏本申公家刻中有橫斷文有章氏印盧氏本斯文下有盧宗道三字印後題唐硬黃本淳熙乙未中秋刻徐滋本在湖州瘦徑而皴剝自十七十八行內有大裂文無名本此本無名氏會字前後有云蘭亭搨傳刻諸家所收本極多未有及此者不知誰書武陵本在第九卷帖中無僧字王氏藏本凡十帙殆百本以定武舊刻為首北本副之嘗從順伯子友任借觀外有四軸奇甚見諸公跋蘭亭考卷十一
