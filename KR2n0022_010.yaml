body:
  text: 蘭亭考卷十宋桑世昌撰詠贊羲之年三十三書蘭亭三十七書黃庭經書訖聞空中有語卿書感我而况人乎吾是天台丈人羊欣筆陳圖二王書語中有蘭亭詩云悠悠大象運輪轉無停際陶化非吾匠去來非吾制宗統竟安在即順理自泰有心未能悟適足纒利害未若任所遇逍遙良辰會其一元章云王仲孜收蘭亭詩一卷悠悠大象運殆是一種分開三春啓羣品一作迹寄暢在所因仰眺碧天際俯磐緑水濵寥朗一作閴無崖觀寓目理自陳大矣造化功萬殊莫不均羣籟雖參差適我無非鄰其二御府本及陸東之本鄰作新又有作親字第一卷此詩無前二句猗撫二三子莫匪高所托造真探玄根涉世若過客前識非所期虛室是為宅遠想千載外何必謝曩昔相與無相與形骸自脫落其三鑑明去塵垢止則鄙吝生體之固未易三殤解天刑方寸無停主矜伐將自平雖無絲與竹玄泉有清聲雖無嘯與歌咏言有餘馨所樂在一朝寄之高千齡合散固其常修短定無始造新不暫停一往不再起於今為神奇信宿同塵滓誰能無此慨散之在推理言立同不朽河清非所俟其五法書要録柳子厚雍州馬退山茅亭記曰蘭亭也不遭右軍則清湍修竹蕪沒於空山矣韓漳州報徹上人詩早歲京華聼越吟聞君江海分逾深他時若寫蘭亭會莫畫高僧支道林韓忠獻王帥定武喜得蘭亭石刻詩云臺英正約尋芳會誰是山陰作序人又云欲繼永和修禊事愧無神筆走龍蛇又云欲學永和當日序愧無奇筆紹前蹤又云一觴一詠無絲管恰似蘭亭列坐時又云休論俯仰為陳迹且學山陰祓禊杯又云會餘俯仰皆陳迹不醉山陰定笑人東坡墨妙亭詩蘭亭繭紙入昭陵世間遺迹猶龍騰顔公變法出新意細筋入骨如秋鷹東坡和陶詩云再遊蘭亭默數永和考蘭亭之會自右軍謝安凡四十二人後大厯中朱迪吳渭吳筠等三十七人經蘭亭故池聨句賞有文辭會歡同癸丑年之句必用是事姚令威西溪叢語華鎮會稽詠古詩墨妙風流亘古今等間陳迹冠山陰耳聞貞觀求真迹眼見天章照茂林鐡限僧房迹未移千通真草了無遺蘭亭墨妙何由見祇説蕭郎奉使時山中父老尚能説蕭翼事薛道祖詩東晉風流勝事多一時人物盡消磨不因醉本蘭亭在後世誰知舊永和清閟堂楊伯時本欒城山陰陳迹詩卧對郗人氣已真晚依邱壑更無倫不須復預淸言侶自是江東第一人注云逸少知淸言之害然蘭亭記亦不免慕淸言耳山谷題楊凝式書俗書喜作蘭亭面欲換凡骨無金丹誰知洛陽楊風子下筆却到烏絲欄山谷贈邱十四詩擁書環坐愛窗明松花泛硯摹真行字身藏穎秀徑清問誰學之果蘭亭蘇易簡題家藏蘭亭詩有若像夫子尚興闕里門虎賁類蔡雍猶旁文舉尊昭陵自一閉真迹不復存今余獲此本可以比璵璠蔣之奇墨妙亭詩蘭亭拓本得遺法字體變化人莫窺梭飛壁間勢屈矯劍出嶽底光陸離可憐闕齧侵點畫鐡網買斷珊瑚枝永徽中所橅蘭亭敘後題云永徽去貞觀不遠得真為最其詩曰永和九年暮春月內史山陰幽興發羣賢題詠無足珍敘引抽毫取奇札好之寫來終不如神助留為後世法二十八行三百字模寫雖多誰定似昭陵竟發不知歸尚有異形終可祕彥遠記模不記紙要録班班有名氏後生有得苦求齊俗説紛紛那有是熠熠客星豈晉所得飬器泉石留腴翰墨戲著談標書存馮式鬱鬱昭陵玉碗已出戎溫無類誰寶真物日月非虛志專乃一繡繅金鐍瑤機錦袚猗歟元章守之勿失翰墨風流冠古今鵝池誰不賞山陰此書雖向昭陵朽刻石猶能易萬金紹興十六年歲次丙寅季春二日懶拙翁米元暉跋於行朝天慶觀東私居書航之北窗時雨霽風和窗明几淨投間杜門為情良適觀右軍修禊序尤快人意也跋致柔定武本圖契朴凋稱聖智萬古奔沉餘末伎蘭亭醉墨更無加始信功名皆倘爾庾翼兒郎豈不黠自是家雞卑野雉退之強聒六藝疏見處才能到姿媚丞相有金那得取不與官家深自祕却因同好露心胸誤使蕭翼誇善計摸金何用置中郎溫韜家有昭陵笥披沙但只取黃金剔軸安能取故紙天章寶塔高嵯峨永著文皇好文藝至今油蠟摸未巳善本何辭萬金棄以上寶晉真偽紛紛甚得知風流千古一羲之山陰勝槩今何在却有人傳定武碑李大異跋遊本逸少遺墨尤貴蘭亭至於玉石因耶律之所棄幸而得存此為異也臨紙三歎繫之以詩英華最忌凋元氣骨榮神淸祓禊詩蠶繭鼠鬚雖我助家雞野鶩竟誰癡梓棺賻襚從英主玉石遲留肯裔夷今日中原陷荆棘摩挲墨本鬢成絲昭陵忍死覔繭紙月在長空影浮水來禽不傳練裙毁婢作夫人喪容止家雞野鶩知何似醜婦撫膺羞欲死君家所藏修禊字如錐畫沙敻無比定武長沙蛇蚓耳王仲衡題袁氏本河東薛紹彭勒唐拓硬黃本嘗贊其後云文陵不載啓古刻石已殘鋒鋩久自滅如出撅筆端臨池幾人誤詎識筆意完貞觀賜拓本尚或傳衣冠茲實兵火餘分𣲖非殊源妙用無隱迹神明當復還祕藏懼不廣模勒金石刋庶幾將墜法可續後世觀來者倘護持何止敵璵璠淸問堂本柳公權紫絲靸蘭亭詩二本待制王廣淵摹石跋云龍圖大諫李公帥府暇日出書請撫石李公李師中也寶晉的聞人今在富鄭公子宿州史君家定武本自薛嗣昌進入詔龕置宣和殿壁或云睿思東閣後徙艮嶽瑪瑙亭舊傳宮詞云瑪瑙亭根萬寶陳珠連璧合鬬精神眇然一片中山石有許光芒獨冠倫蓋謂是也或説米寶晉所賦清平詞之一章桑氏筆記文皇嗜好非聲色偶愛蘭亭亦其癖河南猶恐後來聞竟使昭陵隱真迹世間能悟知幾人墨本真傳意愈勤有似春雲隱明月光影還到千江分法曹得此深恨晚有客攜從大梁遠多言南渡曾罕見大勝薛家蟬翼本嗟我學書從少年較計點畫分􅑦姸老拈撅筆萬事懶忽見錦軸心凄然真行姿媚公所取篆隸何妨更兼有退之但作石鼓歌談笑譏訶換鵝手新安羅頌堂堂淮陰侯夫豈噲等伍放翁評此本可作蘭亭祖馮氏所藏蘭亭二本得之昭德朝氏端彥字美叔説之字伯以公耄字武子其三世也嘉泰二年二月六日陸遊年七十八題繭紙藏昭陵千載不復見此本得其骨殊勝蘭亭面右定武舊本蘭亭骨氣卓然可見不以流湍帶右天五字定真偽也陸遊識南朝千載有斯人拈出蘭亭花草春俯仰之間已陳迹至今此紙尚如新楊誠齋跋袁起巖本劉度次裴過蘭亭書堂詩蘭亭擬金谷逸少比季倫史臣作此語無異屠沽人君看蘭亭墨歲久迹豈陳當時本嬉戲後世乃見真我行適春暮及此禊飲辰墨池奏環玦書堂暗松筠堂中有遺像儼坐遺冠巾情知金堂仙可望不可親物色儻見之欲去猶逡巡昭陵永閟千年迹定武相傳幾樣碑此是中原舊時本石今焉往落東夷君家何處得此紙刻畫爛然猶可喜六丁神物好護持更有諸賢題姓字環澗王容路入山西更向西雨和春雪旋成泥風吹疊巘雲頭散月照平湖鴈影低拄杖負書尋遠寺倩童牽鹿渡深溪今朝獨宿巖東院惟聽猿吟與鳥啼蕭翼宿雲門東客院絶頂高峰路不分嵐煙長鎖緑苔紋獮猴推落臨崖石打破下方遮月雲蕭翼留題雲門右蕭翼詩辭不多見此二詩在雲門作所謂拄杖負書者正訪蘭亭時也似孫題世昌近於東墅閲高續古校書法書名畫方見此詩及跋使御史不有此行烏得是淸絶語故且載之一麾東晉守八體入神書墨水傳遺迹蘭亭表舊居挂冠高興逸坦腹舊牀虛峻嶺崇山景依然想似初高祖之右軍祠堂王龜齡會稽詩羣賢少長畢經過曲水流觴憶永和一代風流已陳迹世殊事異感傷多悟言一室許誰親相遇無非我輩人放浪形骸嗟老矣仰觀宇宙向艱辛右軍書最珍此者以其草藁塗竄之餘初不用意而筆墨蕭散自有天然奇趣耳無心工拙當間暇信手縱橫盡技能朱蠟謄摹猶若此可憐真迹殉昭陵紹興戊午秋因觀畢氏所藏定武舊石本為題前句河東薛仙季同昭陵繭紙傳夢事修禊千古欽餘芳公今克擕定武本趙北復歎塵沙黃細看筆力自外出妙處畫裏藏鋒鋩漢官威儀落眼界九鼎之重虞窺攘暗中摸索辨真贋蔀屋猶有千丈光麴車道逢我所嗜流涎顧視裾淋浪祈公分貺我一本小儒不願尚書郎頃在建康少董寶此凡三本是時已作此語及過臨安少董竟以一本為貺暇日復過書堂又觀此善最因書前詩以繼其後康山田秀實生涯寄簞瓢嗜古成傳癖胸蟠萬卷書禊帖究所出三百七十五異論溢編帙更相自戈矛又類相形色我昔識諸老高論聆侍側王筆貴藏鋒真贋拚金錫精神苟不具徒爾致研席搜訪諸賢語編類置丈室使我心豁然登山如有得忘意於斯文庶可益涓滴作詩謝來貺持寄俟他日趙徽州彥衛倅台日長詩蘭亭二三説丙辰春因以詩和之此其次韻也形稿木心死灰被裘褐櫝瓊瑰彼烏紗而皂帶其慢言似高其遊言似談機心舞於眉端蓋有與之偕來乎李漢老跋田務本家藏蕭生取蘭亭圖蘭亭考卷十
