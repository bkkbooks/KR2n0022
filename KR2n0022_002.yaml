body:
  text: 蘭亭考卷二宋桑世昌撰睿賞太宗皇帝御書前人詩不到蘭亭千日餘嘗思墨客五雲居曾經數處看屛障盡是王家小草書仁宗皇帝至道二年內侍高斑裴愈奏於蘭亭傍置寺賜額天章書堂基上建樓藏三聖御書仁宗皇帝賜御篆寺額按華鎮記云山隂天章寺即逸少修禊之地有鵝墨池引溪流相注每朝廷有命池墨必見其將見則池有浮沫大如斗渙散滿池雲舒霞卷如新研墨下流水復淸徹皇祐中三日連發未幾太宗真宗仁宗三朝御書皆至方勺泊宅編曰蘭亭有逸少研池朝廷每頒降池水墨可染緇太常卿沈紳記其事高宗皇帝攬定武古本蘭亭敘因思其人與謝安共登冶城安悠然遐想有高世之志羲之謂曰夏禹勤王手足胼胝文王旰食日不暇給今四郊多壘宜思自效而虛談廢務浮文妨要恐非當今所宜且羲之挺拔俗邁往之資而登臨放懷之際不忘憂國之心令人遠想慨然又嘆斯文見於世者摹刻重復失盡古人筆意之妙因出其本令精意鈎摹别付碑板以廣后學庶幾倣佛不墜於地也紹興元年秋八月十四日書宗室子晝紹興初在從列宣取所藏定武本遂摹刻禁中高宗親御翰墨即此跋也余自魏晉以來至於六朝筆法無不臨摹或蕭散或枯瘦或遒徑而不回或秀異而特立衆體備於筆下意間猶存於取舍至若禊帖則測之益深擬之益嚴姿態橫生莫造其原詳觀點畫以成至誦不少去懷也翰墨志唐何延年謂右軍永和中與太原孫承公四十有一人修祓禊揮毫製序用蠶繭紙鼠鬚筆遒媚徑健絶代更無凡三百二十四字有重者皆具别體就中之字有二十許變轉悉異遂無同者如有神助及醒后他日更書數十百本終不及此余謂神助及醒後更書數十百本無如者恐此言過矣右軍書豈減禊帖但此帖字數比他書最多若千丈文錦卷舒展玩無不滿人意常在心目不可忘非若其他尺牘數行數十字如寸錦片玉玩之易盡也故宜為萬世法書之寶智永禪師逸少七代孫克嗣家法居永欣寺閣三十年臨逸少真草千文擇八百本散在浙東后並模帖傳弟子辨才唐太宗三召恩賜甚厚求禊帖終不與善保家傳抑可重也豫得其千文藏之復古殿蘭亭贊紹興庚申右軍筆法變化無窮禊亭遺墨行書之宗奇蹤既泯石刻亦工臨倣者誰鑑明於銅論學書先寫正書次行次草蘭亭樂毅論賜汝先各寫五百本然后寫草書右汪逵家藏乃高宗御書前三字亦是宸翰后用御書之寶王羲之樂毅論正書第一天下珍之梁世模出字法奇古全是帝後屬餘杭公主主以帝所重常加寶惜諸王皆求不得及天下一統處處尋訪纍載方獲此書留意運功特盡神妙御書稿本一幅塗改頗多藏汪逵家早來鄭幵奏蘭亭後不見闕字黃庭堅談稹語言乃是庭堅作字畫非今幵來奏並是稹書方是稹方是三字半存御札一軸三紙藏右司黃犖家思陵在御臨賜不一留守呂頥浩越帥孫近薌林向子禋松窗錢端禮米友仁劉光世皆刻於石薌林松窗所賜俱是宸翰紹興七年三月臣頥浩入覲於建康宮既陛辭皇帝遣中使賜以御書晉王羲之蘭亭修禊序臣下拜捧觀如凌玉霄遡紫淸雲章奎畫爛然絢目而不知卷素之在手陛下天縱多能博通衆藝翰墨之妙前兼古人顧如此書雖遠法羲之而天資高邁神意自得直出其上非若世人臨倣摹擬拘於筆畫形似之間者也臣伏思太宗皇帝宸翰之工實逼二王於時臣下名善書者莫能望其倣佛方繼承藝祖卒其伐功屢征不庭時未遑暇神武既定文德誕敷如字學一事猶能獨擅天下而傳美乎後况於紀綱法度之垂裕者乎今陛下乘中興之運躬撫六師志戡多難期復大業需時偃革則還以人文化成天下寶書傳美又將貽萬世以紹我太宗之懿蓋有待焉臣老矣念終無以仰禆聖志尚庶幾及見大勳之集也刋諸琬琰切以為志少保鎮南軍節度使充兩浙西路安撫制置大司馬步軍都總管兼知臨安府事兼管內勸農使兼行宮留守臣呂頥浩謹書呂頥浩謝賜御書蘭亭表絳闕清都甫違帝所雲章奎畫忽到人間被寵鍚之非常覺衰殘之有耀中謝竊以隸文變古書法爭新魏氏以還東晉擅搖毫之妙鍾繇而降右軍馳獨步之名矧蘭亭修禊之遊非金谷望塵之俗騁懷寄傲存逸想於胸中感事臨文發奇姿於筆下斯極當年之美遂為厯代之師珍藏既出於雲門傳刻僅留於朔塞瘦精莫近絶軌難攀恭惟皇帝陛下好學性成多能天縱稍屬干戈之暇不遺翰墨之娛心摹摹當作慕手追何勞取法龍盤鳳翥直與抗衡實惟今古之無雙豈止帝王之第一臣少勤筆硯晚際風雲憂常在於邦家老已捐於文字誤膺上賜還愧夙心懷寶言歸幸免登牀之誚據鞍自失但驚照乘之光期傳祕於私門但輸忠於永世憲聖慈烈皇后皇后嘗臨蘭亭帖佚在人間咸寧郡王韓世忠得之表獻上驗璽文知為中宮臨本賜保康軍節度使吳益刋於石中興小録時紹興十五年秋七月丙寅太后居中宮時嘗臨蘭亭山陰陸升之代劉珙春帖子云內仗朝初退朝曦滿翠屛硯池渾不凍端為寫蘭亭刻吳琚家孝宗皇帝羲之書超詣衆妙古今不可比倫用意精微落筆詳緩一點一畫無不皆有法度揮毫縱心不踰於規矩既無過當亦無不及增之失於有餘損之失於不足作字有八面變態之妙如蛟虬之騫騰鸞凰之翔舞燦然溢紙飛動眩目亦猶仲尼之道出乎其類拔乎其萃自生民以來未之有也覽此修禊詩敘無一筆羲之法亦非唐賢所臨寫全不成字今復還卿至可領也還從臣所進本紹興已未六月思陵嘗臨禊序賜劉光世其子堯仁進之孝宗親灑宸翰於后云恭惟光堯壽聖太上皇帝以天縱之聖富緝熙之學寓之翰墨俯臨王羲之修禊序妙入神品劉光世當靖康之末奉迎濟上率先諸師敦詩閲禮夙蒙恩遇固宜被此寵章其子堯仁褾軸來上捧觀再三復書此以賜之乾道改元季冬臣謹書蘭亭考卷二
