body:
  text: 蘭亭考目錄類二金石之屬提要臣等謹案蘭亭考十二卷舊本題宋桑世昌撰世昌淮海人世居天台陸游之甥也案陳振孫書録解題載蘭亭博議十五卷註曰桑世昌撰葉適水心集亦有蘭亭博議跋曰字書自蘭亭出上下數千載無復倫擬而定武石刻遂為大世大議論桑君此書信足以垂名矣君事事精習詩尤工其即事云翆添鄰塹竹紅照屋山花葢著色畫也書録解題又載蘭亭考十二卷註曰即前書浙東庾司所刻視初本頗有刪改初十五篇今存十三篇去其集字篇後人集蘭亭字作書帖詩銘之類者又附見篇兼及右軍他書迹於樂毅論尤詳其書始成本名博議髙内翰文虎炳如為之序及其刋也其子似孫主為刪改去此二篇固當而其他務從省文多失事實或戾本意其最甚者序文本亦條達可觀亦竄改無完篇首末缺漏文理㫁續於其父猶然深可怪也云云是此書經髙似孫竄改已非世昌之舊矣今未見博議原本無由騐振孫所論之是非然是書為王羲之蘭亭序作集字為文其事無預於羲之羲之他書其事無預蘭亭似孫所刪深合㫁限振孫亦不能不以為當也其中評議不同者如或謂梁亂蘭亭本出外陳天嘉中為智永所得又或謂王氏子孫傳掌至七代孫智永此蘭亭真蹟流傳之不同也又如或謂石晉之亂乗石刻於中山宋初歸李學究李死其子摹以售人後負官緡宋祁為定武帥出公帑買之置庫中又或謂有遊士携此石走四方其人死營妓家伶人取以獻宋祁又或謂唐太宗以榻本賜方鎮惟定武用玉石刻之世號定武本薛紹彭見公厨有石鎮肉乃别刻石易之此又定武石刻流傳之不同也推評條下据王羲之生於晉惠帝大安二年癸亥則蘭亭修禊時年五十有一辨筆陣圗所云羲之年三十三書蘭亭之誤是矣然前卷既引王銍語以劉餗之説為是矣而又云於東墅閱髙似孫校書畫見蕭翼宿雲門留題二詩云使御史不有此行烏得是語則襍録舊文亦未能有所㫁制至其八法一門以書苑禁經諸條専屬之蘭亭尤不若姜夔禊帖偏旁考之為精宻是以曽宏父陶宗儀諸家皆稱姜攷而不用是書然其徵引諸家頗為賅備於宋人題識援據尤詳世昌之原本既佚存此一編尚足見禊帖之源流固不得以陳氏之排擊遽廢是書矣乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀蘭亭考原序晚挈書結廬山陰茂林修竹間訪問王謝遺躅但見壑巖深秀雲物興蔚而已得汪龍谿所藏修禊大圖表之屋壁中山石中字又在棊硯間若與諸人接一日澤卿擕此編見越故事也夫羲之召爲侍中尚書不拜擢後將軍又不拜至於兒娶女嫁便有尚子平之意縷縷書辭間其識度宇量似非江左諸賢可及天若佑晉使昌於事業當不在司徒叔太傅公下今論者知有此帖而已然知此帖者亦足以大雅風流自任况知之者無如澤卿乎詩曰雖無老成人尚有典刑於茲有之旣請序名曰蘭亭考嘉定元年十二月望日華文閣學士通奉大夫提舉江州太平興國官高文虎宋臨川王義慶采擷漢晉以來佳事佳話爲世説新語極爲精絶而猶未爲奇也梁劉孝標注此書引援詳確有不言之妙如漢魏吳諸史及子傳牒志之書皆不必言只如晉一朝史及晉諸公列傳譜録辭章皆出於正史之外是曰注書之法禊之爲帖風流太甚自晉以來難乎下語桑君盡交名公巨卿以及海内之士以充其見聞者固不一然與予游從三十年見必及此其有贊於帖考者尤爲不一今茲浙東臺使齊公屬加彚正遂畧用史法翦裁之爲此書者無非風流大雅之事又無非博古好事之人若齊公獨拳拳於此者是爲風流大雅博古好事之極矣嘉定十七年秋九月日朝議大夫新除秘書省著作佐郎兼權侍右郎官高似孫謹書
