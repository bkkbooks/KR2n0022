body:
  text: 蘭亭考卷七宋桑世昌撰審定下黃伯思法帖刋誤曰讀蘭亭者以不知老之將至旁一僧字為作曾字按古蘭亭本二十八行至十四行間特闊者蓋接紙處與不知字適在此行之末梁舍人徐僧權於其旁著名謂之押縫梁御府中法書率如此僧字下亡其權字世人殊不知此乃云僧者曾之誤因讀為曾不知老之將至按晋史逸少傳及書録第十卷皆載此叙但云不知老之將至並無曾字益可是正蘭亭帖無如定武本此本不失古意疑百餘年物朱翼舊藏蘭亭叙三本治平間蘇黃門自河朔持歸東坡先生謂疑是起草者後僧義祖摹刻石本其一也又定武石刻黃太史云肥不剩肉瘦不露骨者又唐貞觀中摹永禪師石本凡三也中原散亂皆失之渡江來得晋陵胡安定家薛氏定武摹本與今石刻大略相似而此字畫尤近東萊蔡安強書蘭亭石刻定武兩本以前後分真僞此其最前者視諸本為冠張澄題蘭亭所傳智永與唐諸公臨摹者也而以定武本為最襄陽張嵲巨山紹興戊午八月二十六日古今書稱右軍為首正書見曹娥碑妙絶超古與鍾元常抗衡三十年猶及識於河南王晋玉家黃庭經樂毅論若兩手行書見蘭亭叙高風勝韻為一代冠太宗褚遂良摹勒賜近臣此本蓋有苖裔耶洛陽李處權跋戊午中秋前三日已上姚偓本順伯好石刻成癖蘭亭善本收至三四未巳余家無一名帖顧心好之把玩不忍去手雖未若順伯之膏肓然疾在腠理矣所謂不治將深者耶四明樓鑰大防蘭亭叙逸少得意書後賢多臨寫石本數十以定武本為勝石歸薛氏亂後便復難得熟閲悵然維揚朱犯同光宗諱儒題於前塘米南宮謂蘭亭叙為行書第一黃太史謂蘭亭叙摹寫或失之肥瘦要當以心㑹其妙處二公之論古今無以加也世所貴者定武本此定武本之最善者鄭伯肅恭老定武蘭亭舊本在承平時已不易得薛師正之子紹彭刻他本易去而於舊石斫損數字以惑人後以石龕置宣和殿壁渡江以來士大夫家凡得此本悉指為定武本不但肥瘦不同而精彩頓異其竹字託字宛轉處與夫字人字末筆意態橫生非他本可及比斫去本自不多見况未經薛氏所斫之本乎此本舊所拓尤可貴余見蘭亭叙多矣此特一二見耳尤袤延之題跋王順伯第一本淳熙丙午季夏望日唐文皇既得修禊序命趙模韓道政諸葛貞馮承素搨賜諸王近臣虞褚歐陽各有臨迹至今不知幾本而獨貴定武刻順伯諸本皆佳顧以字肥而不刓者為定武則與余所見特異楊柳伯時有薛道祖親籖題一本正肥云是唐古本平生所見前輩所跋定武本皆有依據一畢少董家賜本一蔣丞相家米元章諸人跋本一張文潛家王岐公跋本最後見澄江呂氏舒王所跋與此本無毫髮異其刓缺處正同益信山谷所謂肥不剩肉瘦不露骨者後有識者當賞豫之言尤袤順伯第二本淳熙四年仲春望日定武蘭亭叙凡三本其一李學究本傳為陳僧法極字智永所撫薛道祖别刻本易以歸長安宣和間歸御府前本是也其二字肥有鋒鍔道祖别刻留定武與前本方駕人多誤為舊本非也其三崇山字中斷字差瘦徑得於修城役夫後藏康惟章伯可家伯可云舊刻與岐陽石鼓俱載以北宋元功云嘗從使北聞在中京楊伯時云與薛氏為姻家定武本以玉石刻舒元輿牡丹賦并記之聊廣異聞右北平榮芑題淳熙十三年五月十三日舊聞薛師正帥定武得修禊叙石於殺胡林乞墨本者押至薛惡鼓聲刋别本以授之時已二刻其子紹彭又摹易元本以歸自是定武所刻凡二本政非舊物也今觀順伯所藏亦未敢以薛氏刋本為證然在等輩實稱第一余雖嗜此所蓄未敢自信當訪佳本求正於順伯建安袁說友跋淳熙戊戌二月望日慶厯中宋景公帥定武有舉子携此石至郡死於營妓家樂營吏號河水清者見而識之取獻景文景文喜甚不敢私有留於公帑世謂之定本後薛道祖撫換以歸長安宣和中詔取舊石置睿思殿嘗以墨本分賜近臣時先君通籍殿中遂得此本間關兵火中逮今數十年祕藏不遂精神煥發豈有神佛護持耶榮芑書榮次新所藏本淳熙三年八月二十三日曾大父得侍徽祖經帷獲賜書畫金石刻數十定武蘭亭其一也紹興辛巳金破厯陽書卷俱燼今見榮氏所寶不勝慨歎龔音同光宗諱頥書乾道辛卯正月十二日外兄王嘉叟處藏蘭亭序云初寮先生得於天上與此無異平時所見惟二本耳覃懷李耆俊題淳熙丁酉立秋熙寧末滕章敏帥定武大父以幕府從時蘭亭叙石刻留郡齊世人未知貴也大父撫十餘本復十年薛師正分閫遂為其子道祖易去天下翕然欲得而不可矣南渡以來僕家僅存一本深寶惜之未嘗妄以示人今觀榮次新所藏略無毫髮之異信可賞也汝陰王明清識乾道己丑暮春庚戌蘭亭得於薛氏最善薛與西京王參政家世為婚姻所藏二百本伯父伯兄皆壻王氏崇觀間分二十本余得其一南渡以來所見雖多大抵皆晚故多剝缺然今亦未易得沈端節約之識淳熙乙亥十月既望修禊序唐人所摹最有典型者李學究得此石擕以遊四方而終於定武宋景文為帥取而龕之郡齊遂以定武本著名於世熙寧中薛師正之子道祖摹刻僞本易取歸洛陽掩其跡而於擕去之石鑱損湍流帶右天數字以為異其跡終不可掩宣和間竟歸天上其始末大略如此其獨冠於他本者山谷所謂肥不剩肉瘦不露骨蓋其倣佛矣此紙乃未歸薛氏時所摹尤為可貴王厚之書慶元丁巳下元日定武蘭亭為薛師正之子紹彭易去宣和初其弟嗣昌獻於天上徽宗命龕置睿思東閣壁靖康亂獨此石棄不取高宗駐蹕廣陵宗澤居守東都見之遣騎馳進未逾月復南寇大駕幸浙失之紹興中向子固叔堅帥淮南密旨令搜訪不獲其後叔堅遭臺評以謂窮窖藏掘地土蓋由此紹興壬子夏覔官修門與順伯言此世所未聞當識之所藏舊本之左斯碑紙乃越竹豈非維揚撫打者歟中元日汝陰王明淸題於寓舍芙蓉閣蘭亭叙肥不剩肉瘦不露骨如山谷語頗似定本但以越紙拓故多疑之今觀王仲言所聞殆幾是耶尤袤觀修禊帖李中甫用定武本刻於寧海官舍所貴定武本者以其鐫刻精好不失右軍筆意而已中甫新刻或病其不能皆備衆體故為之解嘲曾槃樂道題蘭亭以定武為第一而定武復有二本真刻為薛氏藏去而以模本刻定武比於吳傅朋處見真定武本略不與他本相侔此其次也襄潭張嵲巨山書紹興丁卯孟夏十四日平仲必毛平仲此刻今在趙仁仲家世傳逸少書帖外惟有蘭亭禊飲序樂毅論黃庭遺教四本蘭亭樂毅論摹失真遠矣而英姿逸韻雅有存者譬如忠臣義士瓌偉絶特之才雖放棄江海形骸憔悴而威儀詞令毅然不撓猶足以度越庸人無數也而黃庭遺教皆非逸少之跡歐陽文忠公以謂黃庭特後人緣山陰換鵝事附益所遺教出於唐寫經手余始聞而疑焉及精考蘭亭樂毅然後知文忠之言為不謬也高郵秦觀太虛題右淮海先生黃素上所書蘭亭序并題跋集中不載真跡今藏高郵勾氏壽南家濟北朝子綺摹以入石因書絶句云少游寫就蘭亭序逸少英姿殆昔人我祖同為長公客每於翰墨契精神但太虛新書誤增一曾字入行間豈本於東坡耶山陰以蘭亭重蘭亭以禊帖顯蘭亭故迹雖存而禊帖獨無善本因以定武古本刋諸石廣平李洪書慶元庚申仲春旦日李又嘗刻一本在安慶府云得於故家歐兗公集古今石刻可謂博而精矣而定武蘭亭不見其可貴豈其時善本尚多更有出定武之右耶此本肥瘦纖穠皆得其所而法度森嚴典型具存真定武舊刻也周紫芝題紹興甲寅五月一日定武蘭亭余家所蓄數十本雖肥瘦徑弱不同而各有所長張頠書楊伯時本慶元巳未四月余家有定武李氏所藏世稱善本因見此刻略無少異衛涇書慶元己未仲夏七月硬黃既不可得定帖獲其真者亦希矣清閔堂山陰馮氏本跋云熙寧二年三月四日時在瓦橋朝端彥美叔題次道書蘇易簡翰林所作一篇元豐元年閏正月晦日謁美叔因書之常山宋敏求元豐七年十月九日夜觀蘭亭見次道手墨令人慨慕端彥題此本有朝美叔宋次道跋為可寶宋所書蘇公詩乃參政易簡題其家所藏唐人摹本絹素上書今藏太常博士汪逵季路家余嘗見之第二本與楊柳伯時所藏薛道祖親題正同以為唐古本云尤袤題蘭亭四本上還昔有唐刻妙甚兵火散失長懷惘惘得觀諸本頗覺神明還觀第一者竒絶不敢奪愛欲求第二者一本不審可否音同光宗諱儒再拜逵道機宜朝奉親友逵道嘗任宗丞如復州諱至游傳其子鋼字仲袤今在其孫詢之處姜夔藏本有四其一題云蘭亭乃是舊本今定州僞本略以十數亦各有好處然余輒能辨之黃庭堅周翰嘗觀姜跋云嘉泰壬戌十二序得於童道人山谷跋乃少年書已得永和筆法周翰者文及甫之字今此本歸檢正黃犖家或云姜以他本聨此跋耳汶陽閻孝忠資道元符戊寅秋七月晦日謁道濟聼琴畢覽蘭亭華陽王晉之乙酉二月二十八日此石今遂歸長安薛氏世所有者模搨而已葛次顔題第二本姜跋云紹聖三年六月一日因得秦璽改元元符戊寅崇寧四年龍集乙酉是時定武舊刻猶在薛氏未歸御府靖康後舊刻無幾余收八帖皆故家物字體筆法與損缺處校之只一石耳惟肥瘦不同耳流俗不識妙處但以其無皴剝古意豈能辨前代所摹石未漫滅時本哉單丙文書於漢江舟中第三本紹熙壬子至后三日都下有董承旨者其先任定武藏禊帖甚富紹興中有中貴任道源欲盡買之不許后向方取去百本酬以僧牒時有堂後官高良臣及臺史盧宗邁皆得之高盧死出以轉售故吾得之皆熙豐以前舊拓本五字不損紙墨如新未經裝者末後向有一空行故存之亦驗定刻之一助第四本嘉定二年長至日永和之刻厯代所寶前賢論訂當以東坡為是正羲之蘭亭記自永嘉亂亡其石癸卯歲僕遊定武聞富人李氏得之府帥下教則得墨本一二而已因授於尚書王公使勒於琅琊之石以大觀者焉守永陽郡杜符卿題甲辰秋重陽日近見馮逵道所藏蘭亭使人欲起拜留觀百餘日乃歸之今又得觀孟逵本清瘦徑拔亦其流亞也陸游務觀嘉泰二年重午日修禊序乃留定武未歸薛氏本承平日已不易得况今日乎臨川王厚之跋高續古本蘭亭以起草本為第一先公嘗言云末後空一行者是初得邵氏刻本有勳字圓印在空中又於姜堯章處見一本亦然司馬遵康惟章官定武與宇文粹中蘇叔黨田元邈劉無言論蘭亭惟章云蘭亭各有佳處至於點畫相去毫釐以為優劣此非具眼不能辨也乃出篋中所有百本云此皆得定武舊本非不佳顧皆在二刻後耳惟章次子名復用此說跋高氏所藏本石刻如右軍臨鍾繇墓田帖長安范氏玉石褚河南靈寶經變相小楷祕閣開皇右軍諸帖與定武蘭亭則石工妙矣高氏所藏蘭亭舊本嵗久斷爛僅可標軸而意韻態度邈焉高古如晉宋間人物風流超逸後人皆不可及此本紙墨俱新而筆法備具精神氣骨有跳天臥閣之雄觀之可喜可愕及與舊本並觀之則品格標韻似覺少低然皆佳本洛人康復紹熙癸丑上元日龍乘雲氣而上天鳳凰翺於千仭今見舊定本蘭亭其猶龍鳳耶陸游慶元丙辰二月十二日王逸少一不得意誓墓不出遂終其身子敬答殿榜之請辭意峻甚豈得世間有得喪禍福哉以此學二王書庶幾得之若不辨此雖家藏昭陵繭紙真跡字字而講之筆筆而求之去蘭亭愈遠矣謂豫不信有如大江陸游六一翁集古所録本四而定刻才居其一米南宮所藏以唐本為最優定刻次之物價豈有常哉存夫人而已季兼蘭注輯録小敘蔡山甫論蘭亭以古本為右云區區寶愛定武本者是不知有唐刻本也此亦頗針流俗之膏肓鞏豐淳熙壬寅上已飲禊會稽郡治之西園既玩順伯所藏蘭亭敘兩軸知所謂世殊事異亦將有感於斯文者猶信及覽諸人跋語又知不獨會禮為聚訟也附書其後尤以發來者之一笑或者尤以箋奏功名語右軍是殆見其杜德機耳晦翁讀右軍箋奏見其錯綜機務使逢其時能發明功名著見於世矣蘭亭禊序蓋國風爰之倫千載而下乃獨以其書傳因見王順伯定武舊本重為慨然陳傅良跋淳熙四年十月二十一日近世論蘭亭序感事興懷太悲蕭統所不取與斜川詩縱情忘憂相去遠甚此似未識二人面目斜川詩與風雅同趣固當别論若逸少論議於晉人最為根據觀其與商深源謝安石會稽王書可見舉世𤣥學方盛誰不能為一死生齊彭殤之言顧獨以陳迹為感慨死生為可痛何也詩三百篇感思憂傷聖人不廢約之止乎禮義以不失性情之正此先王立人紀之大方也若夫遣情於事外忘趣於情表晉以之淪胥矣尚忍聞之哉東坡反蘭亭意為赤壁賦其詞飄飄高遠終近䝉莊之氣象與𤣥學不相似逸少此文必有能辨之者陳謙此本所從得題識號淡巖老人者故右丞張徵也見審定門距今五六十年矣及郭由中乙丑米元暉丙寅歲月皆可次第余既不能知書姑信其遠者則此帖貴矣葉適跋游帖修禊敘是右軍得意處當落筆時自有神助醒後更寫十數本終莫能及此豈當以筆畫求哉山谷晚得定武本已僅能倣佛存筆意今距山谷又幾何時商確真僞大似逐瑰摹寫肥瘦各自成姸當時存之於心會其妙處耳解賞此語許渠具一隻眼羅㸃㸃岐簡獻王得稿書之妙專以晉右軍王羲之為法以極其變化至蘭亭修禊序樂毅論又王所愛玩遺墨藏家廟者今雖僅存游嘗獲觀皆奇麗超絶動心駭目王之孫不流以從官長東都侯懼書家不能盡見奇跡乃諏良工並刻樂石置㑹稽郡齊而屬書其後陸游寶劍既分識者知其必合凡物在天地間離而復合若有數焉余始得蔡君謨字二紙甚愛之恨不見所跋唐搨賜蘭亭本及魯公與澄師大德帖可稽其始末越數年僚友石德興過余偶於卷軸中見之愕然良久曰吾家舊物却有此二本而無蔡跋乃取其遺余以足之相與賞異第不知何時析而為二今茲復會其適然耶其默有數耶紹熙辛亥余守會稽因並刋之郡齊為此邦佳話云王信蘭亭考卷七
