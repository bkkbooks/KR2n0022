body:
  text: 蘭亭考卷十二宋桑世昌撰釋禊風俗通曰周禮女巫掌歲時以祓除疾病禊者潔也尚書厥民析言人解析也蔡雍曰論語浴乎沂禊出於此顔延年曲水詩序周翰注曰鄭國之俗三月上已於溱洧兩水之上執蘭招魂祓除不祥上巳即三日也翰所注引韓詩也李善注曰女巫掌祓除疾病禊者潔也巳者祉也王融序注漢書太后春辛蠶館率皇后列侯夫人桑遵濡人而祓除續禮儀志曰三月上巳官民一作宮人皆禊於東流上自濯洗祓除宿垢為太潔五行志高后八年三月祓灞上師古曰祓除惡之祭也列傳武帝即位無子平陽公主求良家女飾置帝祓灞上而遇焉應劭注云祓除於水上已禊也又衛皇后傳帝祓灞上孟康曰祓除也於霸水祓除也師古曰祓音廢禊音系竹林七賢論王濟諸人嘗至洛水解禊事明日或問曰昨遊有何語議曰張華善説史漢裴逸民敘前言往行衮袞可聽世説諸名士共至洛水戲還樂令廣問王夷甫曰今日戲樂乎王曰裴僕射善談名理有雅致張茂先論史漢靡靡可聽我與王安豐説延陵子房亦超超元箸荆楚歲時記三月三日四民並出水濵為流杯曲水之飲取黍麯菜汁和蜜為餌以厭時氣夏仲御别傳曰三月三日洛水公王以下並南浮橋邊禊仲御時在船中曝藥賈公望之問船中者為誰重問乃答曰會稽北海間民夏仲御續齊諧記晉武帝問三月曲水何義摯虞曰漢徐肇以三月初生三女不育以為怪擕之水濵盥洗因水以泛觴曲水起此束晢曰摯虞不足知此周公成洛邑因流水泛酒故逸詩云羽觴隨波秦昭王三日置酒河曲有金人奉水心劍曰令君制有西夏秦霸因其處立曲水祠二漢相沿皆為盛集帝曰善沈約宋書曰魏已後但用三日不復用巳也紀麗日古用上巳今用三日歐陽詹魯山令李胃三月三日宴寮友序云唐今上御宇之九年定三節二月一日曰中和九月九日曰重陽次取此日之禊飲賜群臣大宴登高臨川四方有土之君亦得宴其寮屬蕭穎士蓬池禊飲序曰禊逸禮也鄭風有之蓋取勾萌發達陽景敷照握芳蘭臨淸川柔和蠲潔用徼介祉晉氏中朝始參燕胥之樂江右宋齊又間以文詠風流遂遠鬱為盛集若夫華林曲水萬乘之降也蘭亭激湍專城之踐也王勃獻之山亭修禊序曰永淳二年暮春三月修祓禊於獻之山亭今之視昔已非昔日之歡後之視今豈復今時之會王維暮春宴逍遙谷序曰竊思楚傳嘗詣草堂之居仰謝右軍忽序蘭亭之事元禎刺越州所辟皆文士鏡湖秦望之遊月三四焉詩什盈帙與副使竇鞏酬唱稱蘭亭絶唱舊唐書上巳日於流水上洗濯祓除去宿垢故謂之祓禊禊者潔也王逸少作蘭亭記云永和九年歲在癸丑會於山陰之蘭亭修禊事也當其羣賢畢集遊目騁懷之際而感慨係之乃有一死生為虛誕齊彭殤為妄作之語議者以此咎羲之之未遇也先文康公晚歲卜居於寶溪之上建觀禊堂於水濵紹興癸丑與客泛舟修禊樂甚距永和癸丑不知其幾癸丑也因與客相與推算自永和九年歲甲子一周為晉義熙九年又一周為宋元徽元年自後梁大通元年隋開皇十三年唐永徽四年開元元年大厯八年太和七年景福二年周顯德二年本朝祥符六年熙寧六年皆歲在癸丑凡七百八十年矣乃作詩以紀其事云快雨霽亭午晴曦作春姸鄰曲饒勝士共開浮棗筵中流愜嘯咏隱浪金壺偏紅芰初出水捧劍疑來前𬗟懷蘭亭會七百八十年可憐右軍癡生死情纒綿由來彭殤齊顧或謂不然吾黨殆天放卜夜就管弦尺六細腰女舞袖輕回旋且畢今日歡不期來者傳葛立方曲水邀歡處遺芳尚宛然名從右軍出山在古人前蕪沒成塵迹規模得大賢湖心舟已並村步騎仍連賞是文辭會歡同癸丑年茂林無舊徑修竹起新煙宛是崇山下仍依古道邊院開新地勝門占舊留田荒阪披蘭築枯池帶墨穿序成應唱道杯作每推先空見雲生岫時聞鶴唳天滑苔封石磴密篠礙飛泉事感人寰變歸慚府服牽寓時仍覩葉歎逝更臨川野興攀藤坐幽情枕石眠玩奇聊倚策尋異稍移船草露猶霑服松風尚入弦山遊稱絶調今古有多篇經蘭亭故池聨句鮑防嚴維劉全白朱迪共二十五人具姓名大厯中唱五十七人見本不注姓名於聨句下日晚蘭亭北煙花曲水濵浴池逢婉女採艾值幽人石壁堪題序沙場好醉人羣公望不至虛擲此芳辰孟浩然期王山人不至越中山水高且深興來無處不登臨永和九年刺海郡暮春三月醉山陰壺觴須就陶彭澤風俗猶傳晉永和更使輕橈徐轉去微風落日水橫波皇甫冉三月三日後亭泛舟洛城春禊元已芳年季倫園裏逸少亭前興中舉白宴際生玄陸離軒蓋淒清管絃萍疏波蕩柳弱風牽未厭歡趣林浮夕煙高求三月三日宴王明府山亭得煙字蘭橈萬轉傍汀沙應接雲峰到若耶舊浦滿來移渡口垂楊深處有人家永和春色千年在曲水鄉心萬里賖君見漁舟時借問前洲幾路入煙霞劉長卿上已泛舟耶溪世間禊事風流處鏡裏雲山若畫屛今日會稽王內史好將賔客醉蘭亭鮑溶上浙東孟中丞或云鮑防作洛人今修禊羣賢勝會稽盛筵陪玉鉉通籍盡金閨波上神仙妓岸傍桃李溪水嬉如鷺振歌響雜鶯啼厯覽風光好沿洄意思迷棹歌能儷曲墨客競分題劉禹錫三日與樂天河南李尹陪令公洛禊曲池流水細鱗鱗高會傳觴似洛濵紅粉翠蛾應不要畫船來往勝於人東坡禊亭齊釀如澠漲緑波公詩句句可弦歌流觴曲水無多日更作新詩繼永和東坡和王勝之風雩三月初三日禊事宣和勝永和又見會稽王內史蘭亭對酒愛新鵝劉旦上已謝王豐父惠酒小桃脫蕚柳梢柔春色無邊破客愁好與永和修故事一時人物盡風流李若水上已當時俯仰尚為陳千載重來感益新曲水已傷迷故迹崇山依舊對遊人許安世僧言王右軍遺迹永和春蘭亭有曩基墨池涵漪淪書堂閟靈像五亭餘圓囷吳奎高士已陳迹靑山猶故居地存修禊水俗有換鵝書舊像丹靑改諸山楷法疏我來尋壞壁妄意有遺餘趙鼎臣宿天章寺記得蘭亭祓禊辰今朝兼是永和春一觴一詠無詩侶病倚山窗憶故人王駕永和縣上已危高宗諱跨淵淪清宜滌世紛飛湍逢石轉潄玉隔山聞影亂林花落山叢澗草熏茲為禊飲地何羡右將軍蔣堂一𣲖西園曲水聲水邊終日會冠纓幾多詩筆無停綴不似當年有罰觥蔣堂景祐丁丑創曲水亭寮屬同賦風流定續蘭亭盛幕府能無竇鞏賢又云右軍筆墨空蘭渚安道風流詫剡溪彭汝礪送程公闢坐想蘭亭通曲水行聞上已接清明明年強健陪嘉集定奪三觥賦不成賀鑄蘭亭考卷十二
