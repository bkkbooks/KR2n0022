body:
  text: 蘭亭考卷三宋桑世昌撰紀原蘭亭者晉右軍將軍會稽內使琅琊王羲之逸少所書之詩序也右軍蟬聨美胄蘭散名賢雅好山水尤善草𨽻以穆帝永和九年暮春三月三日宦遊山隂與太原孫統承公孫綽興公廣漢王彬之道生陳郡謝安安石高平郤曇重熙太原王藴叔仁釋支遁道林逸少子凝徽操之等四十一人修祓禊之禮揮毫製序興樂而書用蠶繭紙鼠鬚筆遒媚徑健絶代所無凡二十八行三百二十四字有重者皆搆别體就中之字最多至二十許字悉無同者一云變轉悉異遂無同者是時殆有神助及醒後他日更書數十百本終不及之右軍亦自愛重留付子孫傳掌至七代孫智永即右軍第五子徽之之後安成王咨議彥祖之孫廬陵王胄昱之子陳郡謝少卿之外孫也與兄子孝賔俱捨家入道俗號永禪師克嗣良裘精勤此藝常居永欣寺閣上臨寫所退筆頭置大簏中簏受石許而五簏皆滿凡三十年所臨真草千文八百餘夲分施浙東諸寺各一今有存者猶直錢數萬孝賔改名惠欣初落髮時俱住會稽嘉祥寺寺即右軍舊居也后欲便於拜掃因移此寺與右軍墳及叔會已下塋域於山隂縣西三十一里蘭渚山下梁武帝以欣永二人皆崇釋教故榜寺為永欣焉寺見會稽志其臨書之閣至今尚存禪師年近百嵗乃終其遺書付弟子辨才才俗姓袁氏梁司空昻之元孫博學工文琴書棊畫皆臻其妙嘗於所寢伏梁上鑿為暗檻以貯蘭亭寶重過於師在日至貞觀中太宗鋭意學二王書訪摹真迹備盡惟蘭亭未獲尋知在辨才處凡三召之恩賚優洽方便善誘確稱往日侍奉先師實嘗獲見洊經喪亂墜失不知所在竟靳固不出上謂侍臣曰右軍之書朕所偏寶求見蘭亭勞於夢寐此僧耆年又無所用若得一智略之士以計取之庶幾必獲尚書左僕射房玄齡奏曰臣聞監察御史蕭翼梁元帝之曾孫今貫魏州莘縣負才藝多權謀可充此使上遂召翼翼曰若公然遣往義無得理臣請私行又須得二王雜帖三數通上悉依給翼遂微服至洛潭隨商舶至越黃衫寬袖得山東書生之體抵寺之夕閲壁間畫過辨才所居才適遙見乃問曰檀越何來翼因就前致謁云弟子是北人擕鬻蠶種厯寺縱觀幸遂一見語意投合延室內即共圍棋撫琴投壺握槊間及文史乃曰白頭如新傾蓋若舊今後無復形迹也既下榻復設缸靣酒江東云缸靣猶河北甕頭謂初熟酒也酣樂之餘分韻賦詩才探得來字其詩曰初醖一缸開新知萬里來披雲同落寞步月共徘徊夜久孤琴思風長旅雁哀非君有祕術誰照不燃灰翼得招字云邂逅欵良宵殷勤荷勝招彌天俄若舊初地豈成遙酒蟻傾還泛心猿躁似調誰憐失羣翼良苦業風飄妍蚩略同彼此諷詠恨相知之晚通宵盡歡翼旦乃去才云檀越間即更來翼繼乃載酒赴之相與酬唱者數四一日翼示師梁元帝自畫職貢圖嗟賞不已因談及翰墨翼曰家世皆習二王楷法自幼耽玩今亦有數帖自隨才欣然謂曰誥誥當作詰旦可擕來翼如期而往出其帖示之才熟視且曰是則是矣然未佳善也貧道有蘭亭真墨迹頗亦殊常翼曰數經亂離真迹豈復在必是響榻者耳才曰先師圓寂之際手手付受端有源緒那得參差次日乃於梁檻內出以示翼翼故駁瑕指纇曰果響榻書也紛競不已自爾更不復藏并翼諸帖並留几格間才時年逾八秩日於窗下臨數遍其老而篤好也如此自是翼往還既密與其徒略無疑間未幾辨才赴靈汜橋南嚴遷家齋翼遂私來謂其徒曰偶遺帛子在案童子即為開門翼因就取蘭亭及御府所借帖徑赴永安驛告驛長凌訴曰我乃御史奉命來此有墨敕可報汝都督時都督齊善行即竇建德之妹壻在偽夏右僕射以吾用曾祖廬江節公及隨黃門侍郎裴矩之䇿舉國歸降我唐由此不失貴仕遙授上相國金印紱綬封真縣公於是善行聞之馳來拜謁翼因宣示上命具告所由善行走介召辨才才遽見追不知所措繼遣散直云侍御須見及才至見御史乃房中蕭生也翼報被命遣取蘭亭今得矣故喚師來取别才聞語哽絶倒良久始蘇翼即馳驛而發至都奏御太宗大悅以玄齡舉得其人賞錦綵千段擢拜翼為員外郎加入五品賜銀瓶一金縷瓶一瑪瑙碗一並寶以珠內廄良馬二兼寶裝鞍轡第宅各一區太宗初怒老僧祕吝俄以其髦不忍加刑數月一作日後仍賜物三千段榖三千石敕越州支給辨才不以入已回造浮圖極其精麗至今猶存才因驚悸成疾嵗餘乃卒一云才因驚悸患重不能強飯惟啜粥嵗餘乃卒太宗命供奉拓書人趙模韓道政馮承素諸葛貞等四人各榻數本以賜皇太子諸王近臣貞觀二十三年帝不豫幸玉華宫含風殿謂高宗曰吾欲從汝求一物汝誠孝也豈能違吾心也汝意何如高宗哽咽流涕引耳而聼受制命曰吾欲將所得蘭亭去及弓劍不遺同軌畢至隨仙駕入元宫矣今趙模等所榻本尚直錢數萬也人間本亦漸稀少代代寶之吾為左千牛將軍隨牒適越泛巨海登會稽探禹穴訪竒書名僧處士猶倍諸郡固知虞預之著會稽典録人物不絶信而有徴辨才弟子元素俗姓楊氏華隂人也漢太尉之后六代祖佺期為桓玄所害子孫避難江東后逺編貫山隂即吾之外氏近屬今殿中侍御史瑒之族長安三年素年已九十二視聼不衰猶居永欣寺永禪師之故房親向吾説聊以退食之暇略疏其始末於時嵗在甲寅季春之月上巳日撰此記主上每暇隙留神藝術迹逾筆聖偏重蘭亭僕開元十年四月二十七日任筠一作均州刺史蒙恩許拜掃至都承訪所得委曲一云至都城訪所委曲緣病不獲詣闕遣男昭成皇太后挽郎吏部常選騎都尉永寫本進其日捧日曜門宣敕內出絹三十匹賜永於是負恩荷澤手舞足蹈捧戴周全光駭閭里僕局天聞命伏枕懷欣殊私忽臨沉疴頓減輒題卷末以示后代朝議郎行職方員外郎上柱國何延之記彥逺家有馮承素蘭亭元和十三年詔取書畫入內今有馮承素樂毅論在並有太宗手帖其後黃伯思東觀餘論云閲法書要録見其文繁瑣戲為刪潤伯思刪本今不復見從太平廣記稍加去取何不欲棄其舊各就箋其下庶兩存之世昌書王右軍蘭亭敘梁亂出外陳天嘉中為僧所得至大建中獻於宣帝隋平陳曰或以獻晉王王不之寶後智果從帝借榻及登極竟不從索果師死后弟子僧言得之太宗為秦王日見榻本驚喜乃貴價市大王書蘭亭終不至也乃遣問辨才師歐陽詢就越州求得之以武德四年入秦府貞觀十年乃榻十本以賜近臣太宗崩中書令褚遂良奏蘭亭乃先帝所重本不可留遂祕於昭陵劉餗傳記太宗貞觀中搜訪王右軍真迹出御府金帛為購賞由是人間古本紛然畢進其草迹又令褚河南真書小字帖紙影之其古本亦有是梁隋官本者梁則滿騫徐僧權沈熾文朱異隋則江揔姚察等署記其後蘭亭一本相傳云將入昭陵元宮長安神龍之際太平安樂公主奏借出外榻寫樂毅論因此遂失所在韋述集賢記褚遂良撰晉右軍王羲之書目內行書五十八卷共二百六十帖以蘭亭敘為第一後跋云正書行書自正觀八年河南公褚遂良於禁中西堂臨寫之際録出唐初有史曰實録此之標目蓋其類也唐張彥逺法書要録何延之蘭亭記云王逸少永和九年蘭亭修祓禊之禮揮毫製序興樂而書用蠶繭紙鼠鬚筆遒媚徑健絶代更無凡二十八行三百二十四字字有重者皆搆别體就中之字最多又尚書故事云唐太宗酷好法書有大王真迹三千六百紙率以一丈二尺為一軸內行書有五十八卷褚遂良以蘭亭為第一太宗寶惜者獨此書為最置於座側朝夕觀覽嘗一日附耳語高宗曰吾千秋萬歲後與吾蘭亭將去也及奉諱之日用玉匣貯之藏於昭陵周越法書苑武德四年秦王俾歐陽詢詐求得之遂入秦府麻道嵩榻二本一與辨才一王自收嘗留肘腋間後從褚遂良請殉葬昭陵南郡新書世昌嘗於范覺民丞相家見五字不損本奇甚後有雪溪跋首載此條頗詳南郡新書云蘭亭帖武德四年歐陽詢就越僧求之始入秦王府麻道嵩奉教榻兩本一送辨才一秦王自收嵩私榻一本於時天下草創秦王雖親總戎蘭亭不去肘腋及即位後學愈不倦至貞觀二十三年褚遂良請入昭陵天下所見但橅本耳餘與推評門所述同唐太宗購晉人書自二王已下僅千軸獨蘭亭文以玉匣葬昭陵世無復見餘皆在祕府至武后時為張易之兄弟所竊換遂流落人間多在王涯張延賞家涯敗時為軍人所劫奪取金玉軸而棄其書余嘗於李都尉瑋處見晉人數帖皆有小印涯字意其為王氏物也故孫莘老求墨妙亭詩有云蘭亭繭紙入昭陵世無復見猶龍騰東坡全篇見后右軍禊飲敘草號稱最得意書宋齊以來藏在祕府士大夫間未聞稱述豈未經大盜兵火時蓋有墨迹在蘭亭右者及蕭氏宇文焚蕩之餘千不存一永師晚出所見妙迹惟有蘭亭故為虞褚輩道之所以太宗求之百方期於必得其后公私相盜今竟失之書家晚得定武本蓋倣佛存古人筆意耳山谷貞觀末太宗一日附語高宗吾欲就爾求一物可乎高宗局足俯伏從之對曰身體髮膚受之父母國家天下陛下所賜此外更欲問臣求何物太宗曰吾千秋萬嵗後欲將蘭亭如何高宗再拜哽噎而已至昭陵作治以玉匣內之元堂其后昭陵纍經開發蘭亭復出人間元豐末有人自兩浙與織女支機石同賫入京師至太康縣值裕陵奉諱不獲上之質錢於民間而去今不復聞存沒王欽若云支機石豫嘗見其圜可方二寸不圜微宛正碧天漢左界北斗經其上太宗在唐不世主也一書之微生以計取死以愛求生猶可玩適死將何為哉與夫富民多藏厚葬者無以異也張舜民畫墁録蘭亭者晉右將軍會稽內史琅琊王羲之逸少所書詩敘也右軍以穆帝永和九年三月三日與太原孫統承公孫綽興公廣漢王彬之道生陳郡謝安安石高平郤曇重熙太原王藴叔仁釋支遁道林及其子凝之徽之操之等四十有一人修祓禊於山隂之蘭亭酒酣賦詩制序用蠶繭紙鼠鬚筆書凡二十八行三百二十四字字有重者皆訪别體而之字最多至二十許字他日更書數十本終無及者右軍亦自愛重留付子孫至七代孫智永為比邱俗呼永禪師永卒傳其書於辨才弟子俗姓袁梁司空昻之玄孫唐貞觀中太宗鋭意學二王書帖摹榻殆盡惟未得蘭亭凡三召辨才詰之固稱洊經喪亂亡失不知所在後遣監察御史蕭翼微服為書生以詭辨才始得之命供奉拓書人趙模韓道政馮承素諸葛貞等四人為拓數本以賜皇太子諸王近臣貞觀二十三年髙宗奉遺詔以蘭亭入昭陵惟趙模所榻者傳於世事見何延之蘭亭記秦觀此跋乃刪取何延之記中語此文自唐明皇得之真迹刻之學士院人間不復見朱梁篡竊輩置汴都耶律德光破石晉此刻渡河輼輬既歸與輜重棄之殺狐林后置之州治遂曰定本碧岫野人趙桎仲古跋明當作文恐誤也宣和中詔宣定武衙校舊人問蘭亭石對曰慶厯中宋祁帥鎮日有學究李姓者藏此石死於妓家樂營將孟水清者得以獻祁祁祕藏不妄與人留於公庫因謂之定本后河東薛珦來帥其子紹彭别刻留郡易之以行今在長安帥薛嗣昌紹彭之弟也時內侍梁師成為長安承受官批旨取舊刻嗣昌倉卒以紙三幅作一重撫石第一本墨深第二本墨淺第三本又加淺世謂之蟬翼本字差大有寫法亦不可廢先君通籍祕殿詳聞此説不可不廣近康與之云與石俱載以北又宋定國嘗從使云在所謂中京者因并記之榮芑定武蘭亭序石刻世稱善本宣和中從仕中山詢訪故老以謂石晉之末契丹自中原輦載寶貨圖書而北至真定德光死漢祖起太原永康自立而歸與其祖母交兵於國棄此石於中山慶厯中土人李學究者得之不以示人韓忠獻之守定武也李生始以墨本獻公公堅索之生乃瘞之地中别刻之本示公又一紀李生謝世其子乃出石散模售人每本須錢一千由是好事者爭取之其后李氏子負緡無從取償時宋景文守定乃以公帑金代輸之因取石匣藏於庫非貴遊交舊不可得也熙寧間薛師正出牧其子紹彭又刻别本者留之中山易古刻携歸長安大觀中詔取其石置宣和殿中間不復見矣飬浩書室書右何薳子楚所著春渚紀聞其真稿見存汪氏家余近以其所傳因考康與之跋續氏所藏及沈虞卿題遊氏本皆採記聞中語獨此跋為詳但其文互有去取姑從而竄定云世昌書李文和遵勉其家書畫最富有懷仁真迹集右軍聖教序貞觀蘭亭詩敘山隂帖樂毅論皆冠世之寶李氏遺事支仲元鳳翔人工畫人物有老子誡徐甲蕭翼賺蘭亭商山四皓等圖傅於世右圖寫人物一軸凡五輩唐右丞相閻立本筆一書生狀者唐太宗朝西臺御史蕭翼也一老僧狀者智永嫡孫會稽比邱辨才也太宗雅好法書聞辨才寶藏其祖智永所蓄右將軍王羲之蘭亭修禊序真迹遣蕭翼出使求之翼至會稽不與州郡通變姓名闕士服徑詣辨才朝暮往還情意習洽一日因論右軍筆迹悉以所携御府諸帖示辨才相與反復折難真偽優劣以激發之辨才乃云老僧有永禪師所寶右軍蘭亭真迹非此可擬藏之梁間不使人知與君相好因以相示翼既見之即出太宗詔札以字軸置懷袖閻立本所圖蓋狀此一段事迹書生意氣揚揚有自得之色老僧口張不呿有失志之態執事二人其噓氣止沸者其狀如生非善寫貌馳譽丹青者不能辨此上有三印其一內合同印其一大章漫滅難辨皆印以朱其一集賢院圖書印印以墨朱久則渝以故唐人間以墨印如王涯小章李德裕贊皇印以墨此圖江南庫所藏簮頂古玉軸猶是故物太宗皇帝初定江南以兵部外郎楊克下一字犯濮安懿王諱知升州時江南內府物封識如故克不敢啓封具以聞太宗悉以賜之此圖居第一品克上蔡人寶此物傳五世以歸其子壻周氏傳再世其孫榖藏之甚祕梁師成請以禮部度牒易之不與后經擾攘榖將逺適以與其同郡人謝伋伋至建康為郡守趙明誠所借因不歸紹興元年七月望有携此軸貨於錢塘者郡人吳説得之後見謝伋言舊有大牙竿後主親題刻其上云上品畫蘭翼籖今不存此畫宜歸御府而久落人間疑非所當寶有者説記吳傅朋跋圖后呂文靖家有蕭翼説蘭亭故事橫卷青錦標飾碾玉軸頭江南舊物郭若虛圖畫見聞志蔡絛為孫氏本立傳該述􅊀矣然自唐以上互見於諸跋中者兹不重出姑刪取國初著説者具載之云偽吳時遣內客省使髙弼聘於蜀弼因獻孟氏世子以石本蘭亭序此本后亦不復見世所流玩每各不同一本患肥肥則神凝乃褚庭誨所臨一本患瘦瘦則韻弱乃洛陽􅷣地所得其餘數本是又在二本之外而愈粗矣今天下其可取者以吾所聞獨有三焉其一褚河南所臨在蘇才翁家先入尚方字勢亦與石不諧其二硬黃本乃諸葛所臨在鄧右轄洵仁家然藏之祕閣迄不得一見或謂亦患肥蓋古之人臨書咸自存其體多不徇其步武為尚故也其三則定武本者乃江左所傳晉會稽石也自晉至錢氏末天下既大一統而定武在富民之家好事者厚以金幣從會稽取之而藏於家未知在熙陵時歟在定陵時歟世罔得其始末及后户絶資沒縣官人始見之因置諸定帥之便坐壁間熙寧中孫次公侍郎帥定有旨納其石禁中則又刻石而還之壁元豐后薛尚書向來定遂取其石以歸世但謂石歸薛氏然不知雅非古矣大觀初裕陵方向文博雅詔索諸尚方則無有或謂此石亦殉裕陵乃更取薛氏石入御府今薛氏石又不知在亡世猶有墨本且傳焉况兵火之厄則雖墨本當亦無幾噫可傷也已吾居夷者久將恐懼之不暇蓋於此夢想所不及紹興丁巳冬閏月忽得定武古石墨本於青社人宋氏子槃蓋傳於其父傅田令端夫端夫得之於汝陽鍾離閔閔授之於孫氏之中甫中甫者次公侍郎之子也其書傳授次第甚明因感嘆之餘且懼后生不克知其源𣲖也乃為之傳而并藏之按劉餗傳記與何延之不同何謂王氏子孫傳掌至七代孫智永永付弟子辨才劉謂梁亂出在外陳天嘉中為永所得太建中獻之隋平陳或以獻晉王王即煬帝帝不知寶僧智果借榻因不還果死弟子辨才得之何謂太宗使蕭翼詭取劉謂太宗見榻書驚喜使歐陽詢求得之據何説太宗得蘭亭在即位後劉謂以武德二年入秦王府何謂太宗末年從高宗乞蘭亭從葬劉謂髙宗從褚遂良之請何謂辨才之師智永如劉所言即智果矣前輩謂行間僧字為徐僧權書縫吳傅朋家古石本僧字上又有一察字當是姚察如此則劉説似可信然考梁武收右軍帖二百七十餘軸當時惟言黃庭樂毅告誓何為不及蘭亭此真迹之異同也薑夔集古系時録第三卷內云蘭亭修禊敘王右軍書有五本薛家本為真定武本次之長安本又次之餘二本不載右軍祠堂碑有云公之生也踐得二之機膺五百之慶骨鯁清貴鑑裁端凝夷簡淡雅魁梧頺放性敖如也深為伯父大將軍敦丞相導之所器重學揔墳索藝苞流略書窮八體才贍五能至若垂露崩雲芝英薤葉鸞回鵲顧之巧虎踞龍騰之勢信可挺拔終古輝映來今者乎我太宗萬幾之暇宏覽典墳得之右軍欣然師範親製贊論有曰詳察古今研精篆素盡善盡美其惟王右軍乎心摹手追此人而已斯乃萬世之榮觀也又云既而金行不競小人道長興言慷慨峻誓墳塋隨時卷舒關國隆替窮述名山遍厯滄海龜組褫龍車煉金膏屑瓊蕊濬曲水茂蘭亭於是謝安孫綽李充許詢支遁許邁之儔若非闕一字首謝師即是文章冠代何嘗不攀勝慕德夕處朝遊公自為之序以申其志也唐王師範兒時從祖祕監君官定武見蘭亭古刻在州治東園射圃之東葵亭西壁刻治甚妙第五行帶字右字第八行天字筆畫已闕壞石青色大觀己丑下第京師頗無聊賴適王彥昭侍郎出帥定武相與携持而去復求此石與舊所見無異移置書室中護持甚謹但白石非青石而葵亭迷所在矣此本出豢龍董氏云淳化間其祖君官定武時模打非特三字俱無恙而筆意具在如以為字俯仰字取諸字毫忽轉摺皆他本所無什襲緘封凡三百本又出其官定武間告身以表之而一本取錢二萬余驚而愛之於三百本中拔取其尤得三本皆錦標而玉軸之庶幾乎發揮之矣東平畢少董紹興甲午正月丙午蘭亭考卷三
