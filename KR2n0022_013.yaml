body:
  text: 會稽太守黃由字入昭陵不可模後來僅及晉之餘識真盍向龜堂問敢謂牽聨亦得書澤卿年七十餘著蘭亭考自中原及渡江諸人題跋網搜幾遍甲是乙非真若聚訟讀之令人腹煩因思此序蓋歐褚諸公之寫真耳然研之極乃通於神如洙泗諸子之肖仲尼終自弗叛非天寶以後諸人之所及也嗚呼哀哉鞏栗齋寄示跋王順伯本天台老樵示蘭亭考坐間矻矻説此書且曰我幾蘭亭癡矣平生惟一善本為人取去豈謂寓意於物不留意於物者耶白鹿峰陸樗嘉定初元嘉平望道山堂觀蘭亭考歎其贍博長樂陳舜申宋模莆田劉矩仲則溫陵陳模中行四明傅行簡欽父華亭林至德久建安真德秀景化金陵何剡楫臣淸源留元剛茂潛檇李陸埈子高石更靑白故兼新字看由中總是真畢子一生三百紙樓公四句幾千春從來考古難題處直到名流下筆親奄有山隂多寶藏草菴外面更無人廬陵楊長孺蘭亭考用意勤甚欲人無所不知詎可厭其多耶先太史字畫多法蘭亭至謂遊荆州得古本蘭亭因悟筆意是殆有言語不可傳者矣雙井黃􅓌子耕字書自蘭亭出上下數千載無復倫擬而定武石遂為今世大議論桑君此書信足以垂名矣君事事精到習詩尤工其即事云翠添鄰塹竹紅照屋山花蓋著色畫也葉適嘉定辛巳冬碩蒙恩守台行山隂道上壑流巖秀洞心駭目想像入東晉諸賢高風逸韻邈乎其不可挹也至郡有以桑君蘭亭考見示者其􅀈稡訂證靡有遺恨豈惟歎其識見之該洽暇日開卷往往令人神遊茂林修竹之下癸未司庾入越間得一至山中雖永和陳迹已不復見而高林崇阿正自無恙矧思陵所臨禊帖有光燭天倉司郡齋咸有舊刻嘗經前輩品題俱在考中真足以慰懷古之意然則是編可謂有功於蘭亭當行於越無可疑者內相高公曩嘗敘其編首今吏部復刪潤之豈非是編之幸碩得附名其末抑又幸也甲申季冬十日靑社齊碩謹書
