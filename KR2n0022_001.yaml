body:
  text: 蘭亭考卷一宋桑世昌撰蘭亭按通典曰蘭亭山隂漢舊縣亭王羲之曲水序於此作唐郡國志曰山隂有王逸少蘭亭元和郡國志曰蘭亭山在越州西南二十里十道志曰越州蘭亭王逸少會處越絶書蘭亭在山隂越王種蘭處三朝國史曰越州山隂有蘭渚鑑湖會稽志曰蘭渚在縣南西二十五里舊經云山隂縣西有亭王右軍所置曲水賦詩作序於此水經曰浙江東與蘭溪合湖南有天柱山湖口有亭號蘭亭亦曰蘭上里太守王羲之謝石兄弟數往造焉吳郡太守謝朂封蘭亭侯王􅘙之移亭在水中晉司馬何無忌之臨郡也起亭於山椒極高盡眺亭宇雖壞基陛尚存蘭亭修稧序晉人謂之臨河序唐人稱蘭亭詩序或言蘭亭記歐公曰修禊序蔡君謨云曲水序東坡云蘭亭文山谷云稧飲敘通古今雅俗所稱俱云蘭亭至高宗皇帝所御宸翰題曰稧帖永和九年嵗在癸丑暮春之初會於會稽山隂之蘭亭修稧事也羣賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管絃之盛一觴一詠亦足以暢敘幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以遊目騁懷足以極視聽之娛信可樂也夫人之相與俯仰一世或取諸懷抱悟言一室之內或因寄所託放浪形骸之外雖趣舍萬殊靜躁不同當其欣於所遇暫得於已快然自足不知老之將至及其所之既倦情隨事遷感慨係之矣向之所欣俯仰之間以為陳迹猶不能不以之興懷况修短隨化終期於盡古人云死生亦大矣豈不痛哉每攬昔人興感之由若合一契未嘗不臨文嗟悼不能喻之於懷固知一死生為虛誕齊彭殤為妄作後之視今亦由今之視昔悲夫故列敘時人録其所述雖世殊事異所以興懷其致一也後之攬者亦將有感於斯文詩右將軍會稽內史王羲之代謝鱗次忽焉以周欣此暮春和氣載柔詠彼舞雩異世同流乃携齊契散懷一邱仰眺碧天際俯瞰緑水濵寥朗無涯觀寓目理自陳大矣造化功萬殊靡不均群籟雖參差適我無非親御府本及陸柬之本作鄰又作新篇首又多二句司徒謝安一云琅琊王友伊昔先子有懷春遊契兹言執寄傲林邱森森連嶺茫茫原疇逈霄垂霧凝泉散流相與欣嘉節率爾同褰裳薄雲羅物景微風扇輕航醇醪陶元府兀若遊羲唐萬殊混一象安復覺彭殤司馬左西屬謝萬肆眺崇阿寓目髙林青蘿翳岫修竹冠岑谷流清響條鼓鳴音玄蕚吐潤飛霧成隂玄冥卷隂斾勾芒舒陽旌靈液披九區光風扇鮮榮碧林輝雜英紅葩擢新莖翔禽無汗逺騰鱗躍清泠右司馬孫綽春詠登臺亦有臨流懷彼伐木肅此良儔修竹隂沼旋瀨縈邱穿池激湍連泛觴舟流風拂枉渚亭雲蔭九臯嬰羽吟修竹遊鱗戲蘭濤雋筆落雲藻微言剖纎毫時珍豈不甘忘味在聞韶行參軍徐豐之俯揮素波仰掇芳蘭尚想嘉客希風永嘆清響凝絲竹班荆對綺疏零觴飛曲津歡然朱顔舒前餘姚令孫統茫茫大造萬物齊軌罔悟玄同競異標旨平勃運謨黃綺隱几凡我仰希期山期水地主觀山水仰尋幽人蹤回沼激中逵踈竹間修桐因流輕轉觴冷風飄落松時禽吟長澗萬籟吹連峰前永興令王彬之丹崖竦立葩藻映林緑水揚波載浮載沉鮮葩映林薄遊鱗戲清渠臨軒欣投釣得意豈在魚王凝之莊浪濠津巢步一作安頴湄冥心玄寄千載同歸煙煴柔風扇熙怡和氣淳駕言興時逰逍遙映通津王肅之在昔暇日味存林嶺今我斯遊神怡心靜嘉會欣時遊豁朗暢心神吟咏曲水瀨緑波轉素鱗王徽之散懷山水蕭然忘機秀薄粲頴踈松籠崖遊羽扇霄鱗躍清池歸日寄歎心冥二竒先師有冥藏安用羈世羅未若保沖真齊契箕山阿陳郡袁嶠之人亦有言意得則歡嘉賔既臻相與遊盤微音迭詠馥焉若蘭苟齊一致遐想揭竿四眺華林茂俯仰清川煥一作渙激泉流芳醪豁爾纍心散遐想逸民軌遺音良可玩古人詠舞雩今也同斯嘆已上十一人各成四言五言詩一首散騎常侍郤曇溫風起東谷和氣振柔條端坐興逺想薄言遊近郊前參軍王豐之肆盻巖岫臨泉濯趾感興魚鳥安兹幽峙前上虞令華茂林榮其鬱浪激其隈泛泛輕觴載欣載懷潁川庾友馳心域表寥寥逺邁理感則一冥然玄會鎮軍司馬虞説神散宇宙內形浪濠梁津寄暢須臾歡尚想味古人郡功曹魏滂三春陶和氣萬物齊一歡明后欣時康駕言映清瀾亹亹德音暢蕭蕭遺世難望巖愧脫屣臨川謝揭竿郡五官佐謝懌一作繹蹤暢任所適回波縈遊鱗千載同一朝沐浴陶清塵潁川庾藴仰懷虛舟説俯嘆世上賔朝榮雖云樂夕斃理自因前中軍參軍孫嗣望巖懷逸許臨流想竒莊誰云玄風絶千載挹遺芳行參軍曹茂之時來誰不懷寄散山林間尚想方外賔超超有餘間徐州西平曹華漫録云曹華平願與逹人遊解結遨濠梁狂吟任所適浪遊無何鄉榮陽柏偉主人雖無懷應物寄有尚宣尼遨沂津蕭然心神王數子各言志曾生發竒唱今我嘆斯遊愠情亦暫暢王玄之松竹挺巖崖幽澗激清流蕭散肆情志酣暢豁滯憂王藴之散豁情志暢塵纓忽以捐仰詠挹遺芳怡神味重玄王渙之去來悠悠子被褐良足欽超迹修一作超足循獨往玄契齊古今已上一十五人一篇成侍郎謝瑰鎮國大將軍掾卞迪行參軍事印邱髦王獻之行將軍羊模參軍孔熾參軍劉密山隂令虞谷府功曹勞夷府主簿后綿一作澤前長岑令華耆前餘姚令謝滕府主簿任擬一作汪假任城吕系任城吕本彭城曹禮一作禋晉列傳有李充天章碑則無之已上一十六人詩不成罰酒三巨觥修禊之會人各賦詩成兩篇者自右軍安石而下才十一人成一篇者郤曇王豐而下十五人詩不成罰觥者凡十六人今觀所傳詩類皆四言五言而又兩韻者爾四韻者無幾四言二韻止十六字耳當時得預者往往皆知名士豈獻之輩終日不能辭於十六字哉竊意古人持重自惜不欲率爾恐貽久逺譏議不如不賦之為愈䂬溪黃徹詩話後序古人以水喻性有旨哉非所以停之則清淆之則濁耶故振轡於朝市則充屈之心生間步於林野則寥落之意興仰瞻羲唐邈然逺矣近詠臺閣願深增懷聊於曖昧之中期乎瑩拂之道暮春之始禊於南澗之濵高嶺千尋長湖萬頃乃藉芳草鑑清流覽卉物觀魚鳥具類同榮資生咸暢於是和以醇醪齊以逹觀快然兀矣復覺鵬鷃二物哉耀靈促轡急景西邁樂與時去悲亦係之往復推移新故相換今日之迹明旦陳矣感詩人之致興諒詠歌之有由文多不載大略如此所賦詩亦裁而綴之如前四言五言焉乾道二年十月二十七日宏福寺沙門懷仁集寫晉王右軍書按羣賢賦詩刻本有二會稽者內避本朝諱多代以他字又多闕損殊失其旨且先後次序與中山王子高寫本稍異若後序與藝文類聚所載詳略亦多不同姑以集字夲為正蘭亭考卷一
