body:
  text: 蘭亭考卷一宋桑世昌撰蘭亭按通典曰蘭亭山隂漢舊縣亭王羲之曲水序於此作唐郡國志曰山隂有王逸少蘭亭元和郡國志曰蘭亭山在越州西南二十里十道志曰越州蘭亭王逸少㑹處越絶書蘭亭在山隂越王種蘭處三朝國史曰越州山隂有蘭渚鑑湖㑹稽志曰蘭渚在縣南西二十五里舊經云山隂縣西有亭王右軍所置曲水賦詩作序於此水經曰浙江東與蘭溪合湖南有天柱山湖口有亭號蘭亭亦曰蘭上里太守王羲之謝石兄弟数徃造焉吳郡太守謝朂封蘭亭侯王􅘙之移亭在水中晋司馬何無忌之臨郡也起亭於山椒極高盡眺亭宇雖壊基陛尚存蘭亭修稧序晋人謂之臨河序唐人稱蘭亭詩序或言蘭亭記歐公曰修禊序蔡君謨云曲水序東坡云蘭亭文山谷云稧飲叙通古今雅俗所稱俱云蘭亭至高宗皇帝所御宸翰題曰稧帖永和九年嵗在癸丑暮春之初㑹於㑹稽山隂之蘭亭修稧事也羣賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管絃之盛一觴一詠亦足以暢叙幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以遊目騁懐足以極視聴之娛信可樂也夫人之相與俯仰一世或取諸懐抱悟言一室之内或因寄所託放浪形骸之外雖趣舍萬殊静躁不同當其欣於所遇蹔得於已快然自足不知老之將至及其所之既倦情隨事遷感慨係之矣向之所欣俛仰之間以為陳迹猶不能不以之興懐况修短隨化終期於盡古人云死生亦大矣豈不痛哉每攬昔人興感之由若合一契未嘗不臨文嗟悼不能喻之於懐固知一死生為虚誕齊彭殤為妄作後之視今亦由今之視昔悲夫故列叙時人録其所述雖世殊事異所以興懐其致一也後之攬者亦將有感於斯文詩右將軍㑹稽内史王羲之代謝鱗次忽焉以周欣此暮春和氣載柔詠彼舞雩異世同流乃携齊契散懐一邱仰眺碧天際俯瞰緑水濵寥朗無涯觀寓目理自陳大矣造化功萬殊靡不均群籟雖参差適我無非親御府本及陸柬之本作隣又作新篇首又多二句司徒謝安一云琅琊王友伊昔先子有懐春遊契兹言執寄傲林邱森森連嶺茫茫原疇逈霄垂霧凝泉散流相與欣嘉節率爾同褰裳薄雲羅物景微風扇輕航醇醪陶元府兀若遊羲唐萬殊混一象安復覺彭殤司馬左西屬謝萬肆眺崇阿寓目髙林青蘿翳岫修竹冠岑谷流清響條鼓鳴音𤣥蕚吐潤飛霧成隂𤣥冥卷隂斾勾芒舒陽旌靈液披九區光風扇鮮榮碧林輝雜英紅葩擢新莖翔禽無汗逺騰鱗躍清泠右司馬孫綽春詠登臺亦有臨流懐彼伐木肅此良儔修竹隂沼旋瀬縈邱穿池激湍連汎觴舟流風拂枉渚亭雲䕃九臯嬰羽吟修竹游鱗戯蘭濤雋筆落雲藻微言剖纎毫時珍豈不甘忘味在聞韶行參軍徐豐之俯揮素波仰掇芳蘭尚想嘉客希風永嘆清響凝絲竹班荆對綺䟽零觴飛曲津歡然朱顔舒前餘姚令孫統茫茫大造萬物齊軌罔悟𤣥同競異標㫖平勃運謨黄綺隐几凡我仰希期山期水地主觀山水仰尋幽人踪廻沼激中逵踈竹間修桐因流輕轉觴冷風飄落松時禽吟長澗萬籟吹連峰前永興令王彬之丹崖竦立葩藻映林緑水揚波載浮載沉鮮葩映林薄遊鱗戱清渠臨軒欣投釣得意豈在魚王凝之莊浪濠津巢歩一作安頴湄㝠心𤣥寄千載同歸烟煴柔風扇熈怡和氣淳駕言興時逰逍遥映通津王肅之在昔暇日味存林嶺今我斯遊神怡心静嘉㑹欣時遊豁朗暢心神吟咏曲水瀬緑波轉素鱗王徽之散懐山水蕭然忘機秀薄粲頴踈松籠崖遊羽扇霄鱗躍清池歸日寄歎心冥二竒先師有冥藏安用覊世羅未若保沖真齊契箕山阿陳郡袁嶠之人亦有言意得則歡嘉賔既臻相與遊盤微音迭詠馥焉若蘭苟齊一致遐想掲竿四眺華林茂俯仰清川煥一作渙激泉流芳醪豁爾累心散遐想逸民軌遺音良可玩古人詠舞雩今也同斯嘆已上十一人各成四言五言詩一首散騎常侍郄曇温風起東谷和氣振柔條端坐興逺想薄言遊近郊前參軍王豐之肆盻巖岫臨泉濯趾感興魚鳥安兹幽峙前上虞令華茂林榮其欝浪激其隈汎汎輕觴載欣載懐潁川庾友馳心域表寥寥逺邁理感則一㝠然𤣥㑹鎮軍司馬虞説神散宇宙内形浪濠梁津寄暢須臾歡尚想味古人郡功曹魏滂三春陶和氣萬物齊一歡明后欣時康駕言映清瀾亹亹德音暢蕭蕭遺世難望巖愧脱屣臨川謝揭竿郡五官佐謝懌一作繹踪暢任所適回波縈遊鱗千載同一朝沐浴陶清塵潁川庾藴仰懐虚舟説俯嘆世上賔朝榮雖云樂夕斃理自因前中軍參軍孫嗣望巖懐逸許臨流想竒莊誰云𤣥風絶千載挹遺芳行參軍曹茂之時來誰不懐寄散山林間尚想方外賔超超有餘閒徐州西平曹華漫録云曹華平願與逹人遊觧結遨濠梁狂吟任所適浪遊無何鄉榮陽栢偉主人雖無懐應物寄有尚宣尼遨沂津蕭然心神王數子各言志曾生發竒唱今我嘆斯遊愠情亦暫暢王𤣥之松竹挺巖崖幽澗激清流蕭散肆情志酣暢豁滯憂王藴之散豁情志暢塵纓忽以捐仰詠挹遺芳怡神味重𤣥王渙之去來悠悠子被褐良足欽超迹修一作超足循獨徃𤣥契齊古今已上一十五人一篇成侍郎謝瑰鎮國大將軍掾卞廸行參軍事印邱髦王獻之行將軍羊模參軍孔熾參軍劉密山隂令虞谷府功曹勞夷府主簿后綿一作澤前長岑令華耆前餘姚令謝滕府主簿任儗一作汪假任城吕系任城吕本彭城曹禮一作禋晋列傳有李充天章碑則無之已上一十六人詩不成罰酒三巨觥修禊之㑹人各賦詩成兩篇者自右軍安石而下纔十一人成一篇者郄曇王豐而下十五人詩不成罰觥者凡十六人今觀所傳詩類皆四言五言而又兩韻者爾四韻者無幾四言二韻止十六字耳當時得預者徃徃皆知名士豈獻之軰終日不能辭於十六字哉竊意古人持重自惜不欲率爾恐貽乆逺譏議不如不賦之為愈䂬溪黄徹詩話後序古人以水喻性有㫖哉非所以停之則清淆之則濁耶故振轡於朝市則充屈之心生閑歩於林野則寥落之意興仰瞻羲唐邈然逺矣近詠臺閣願深增懐聊於曖昧之中期乎瑩拂之道暮春之始禊於南澗之濵高嶺千尋長湖萬頃乃藉芳草鑑清流覽卉物觀魚鳥具類同榮資生咸暢於是和以醇醪齊以逹觀快然兀矣復覺鵬鷃二物哉耀靈促轡急景西邁樂與時去悲亦係之徃復推移新故相換今日之迹明旦陳矣感詩人之致興諒詠歌之有由文多不載大畧如此所賦詩亦裁而綴之如前四言五言焉乾道二年十月二十七日宏福寺沙門懐仁集冩晋王右軍書按羣賢賦詩刻本有二㑹稽者内避本朝諱多代以他字又多闕損殊失其旨且先後次序與中山王子高冩本稍異若後序與藝文類聚所載詳畧亦多不同姑以集字夲為正蘭亭考卷一
