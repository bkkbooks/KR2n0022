body:
  text: 蘭亭考卷六宋桑世昌撰審定上蘭亭修禊序世所傳本尤多而皆不同蓋唐數家所臨也其轉相傳模失真彌逺然時時猶有可喜處豈其筆法或得其一二耶想其真迹宜如何也哉世言真本葬在昭陵唐末之亂昭陵為溫韜所發其所藏書畫皆剔取其裝軸金王而棄之於是魏晉以來諸賢墨迹遂復流落於人間本朝太宗皇帝時倣摹所得集以為十卷俾模傳之數以分賜近臣今公卿家所有法帖是也然獨蘭亭真本亡矣故不得列於法帖以傳今豫所得皆人家舊所藏者雖筆畫不同聊並列之以見其各有所得至於真偽優劣覽者當其前一本流俗所傳不記其所得其二得於殿中丞王廣淵其三得於故相王沂公家又有别本在定州民家二家各自有石較其本纎毫不異故録其四得於三司蔡給事君謨世所傳本不出乎此其或尚有所未傳更俟博采歐陽文忠公集古録真本已入昭陵後世徒見此而已然此本最善日月逾逺當復闕壞後生所見愈微愈踈矣東坡外寄所託改作因寄於今所欣改作向之豈不哀哉改作痛哉良可悲也改作悲夫有感於斯改作斯文凡塗兩字改六字注四字曾不知老之將至誤作僧已為陳迹誤作以亦猶今之視昔誤作由舊説此文字有重者皆訪别體而之字最多今此之字頗有同者又嘗見一本比此微加楷疑此起草也然放曠自得不及此本逺矣子由自河朔持歸寶月大師惟簡請共本令左綿僧意祖摹刻於石軾書題河朔本治平四年九月十五日蘭亭模本祕閣一本蘇才翁家一本周越一本有法度精神餘不足觀也石本惟此書至佳淡墨稍肥字尤美健可愛或云出於河北李學究家今王公和所藏也蔡襄蘭亭禊飲詩敘二本前一本是都下人家用定武舊石刻摹入木板者頗得筆意亦可玩也一本以門下蘇侍郎所藏唐人臨寫墨迹刻之成都者中有數字極瘦徑不凡東坡謂此本乃絶倫也然此本瘦字時有筆弱骨肉不相宜稱處竟是常山石刻優爾為張熙載書此蘭亭詩敘筆意清峻和暢佳石刻也恨墨本者著墨瀋太深失其微細筆畫耳余舊有淡墨數本頗見古人用筆起倒兒輩不解珍惜有乞書者輒與之今家書中幾一空也跋重刻定武天字不全本此本以定州蘭亭土中所得石摹入棠梨板者字雖肥骨肉相稱觀其筆意右軍清真風流氣韻冠映一世可想見也今時論書者憎肥而喜瘦黨同而妬異曾不夢見右軍腳汗氣豈可言用筆法耶元符三年四月甲辰涪翁題棠梨板本紹聖元年六月上藍院南軒同程正輔觀唐本蘭亭雖姿媚不及定州石刻清徑然亦自有勝處洛神賦余嘗疑非王令遺筆豈古本既零落後人附託之耶周越少收斂筆勢亦可及此跋唐本褚庭誨所臨極肥而雒陽張景元斸地得闕石極瘦定武本則肥不剩肉瘦不露骨猶可想見其風三石刻皆有佳處不必寶已有而非他也並山谷宗室叔盎收蘭亭差不及吾家本在舜欽本上因重背易其故背紙遂乏精彩然在都門最為佳本王鞏見求余家印本曰此湯普徹所摹與贈王詵家摹本一同今甚思之欲得以自解耳錢塘關景仁收唐石本蘭亭佳於定本不及此板本也右米氏祕玩天下法書第一唐太宗既獲此書使起居郎褚遂良檢校馮承素韓道政趙模諸葛貞之流撫賜王公貴人見於張彥遠法書要録此軸有蘇氏故題為褚遂良撫觀其意易改誤數字真是褚法皆率意落筆所書餘字皆勾填清潤有秀氣轉摺毫鋩備盡與真無異非深知書者所不能到世俗所收或肥或瘦乃是工人所作正以此本為定壬午閏六月大江濟川亭艤寶晉齋艎對紫金羣山迎快風避暑九日手裝蘇耆家第二本少長字世傳衆本皆不及長字其中二筆相近末後捺筆鈎迥回筆鋒真至起筆處懷字內折筆摺筆抹筆皆轉側褊而見鋒暫字內斤字足字轉筆敗毫隨之於研筆處敗毫直出其中世之摹本未嘗有也褚遂良所臨黃素至欣字合縫用證摹本僧字果徐僧權書縫也蘭亭序第二本為古今冠與余所獲蘇中令家貞觀名手模無少異襄陽米芾芾頓首再拜比得謝安帖李公照家者作一替發笑不知何時得公一見又得唐刻本蘭亭絲髮不差遂用其本刻成今天下惟此本矣希一賞發論與公俱老矣自此願留心書畫以了殘年餘事徒敝精神如何如何芾惶恐並寶晉蘭亭修禊前序世傳隋僧智永臨寫後序唐僧懷仁素麻箋所書共成一軸永嘉太守待制程公見賞歎刻之樂石與天下後世知有蘭亭筆法者共之虞褚輩多臨蘭亭而永師實右軍末裔頗能傳其家法故此書活動宛有回鸞返鵠之意較之世間石本何啻九牛毛耶懷仁唐書僧號能集右軍書者首尾映帶誠為尤物錢塘吳説右蘭亭石刻得於周延雋仲章少卿之子衍仲章父安惠公起真廟朝任樞密副使同寇萊公丁晉公執政立朝不阿為晉所忌仲章與臨川王荆公厚善因表其墓安惠公弟越皆著書名大觀己丑先子守新安衍幕官安惠公所藏妙墨祕玩尚多存者蓋仲章能以翰墨世其家故衍守之不墜而蘭亭古本尤所珍惜以余酷愛久以見贈雖兵火艱難未始不相隨也子孫寶之曾伋彥思題紹興癸酉七月五日大父正國調京師謁徐神翁至寶籙宫前逢道人持一瓢一軸求雋乃蘭亭序也後有貞觀小印歐陽文忠公孫文懿公抃趙康靖公槩胡文恭公宿在翰苑時題識道人笑曰欲易袍且陳蘭亭真偽之辨厯厯有據以一褐酬之擕歸高郵示秦太虛太虛驚歎且跋其後建炎南渡莫知存在桑氏筆記陶隱居論逸少書云吳興以前諸迹未至絶倫凡好迹皆會稽時永和十許年中書又自誓墓後益自珍不復為人書則蘭亭古今獨貴固宜今本在世非一結體亦異書家得褚庭誨所臨恨太肥洛人張景先得闕石本又恨太瘦惟定武本肥瘦得中今觀此軸豐而不餘瘠而不窘不失筆意端可冠冕衆本也葛立方題洪慶善本司業汪逵家藏禊序至多內一軸首跋乃康伯可次有二跋云此本金石之祕寶也宜十襲藏之紹興丙辰季夏十有一日觀於資善堂武陽朱震書曲水序自薛氏易古石刻亂真者多此本誠可寶也紹興六年十一月二十六日資善堂觀沖侍讀范公也又續瑾印章印跋尾合縫有康伯可印唐文皇初得此序命歐褚趙模馮承素韓道政諸葛貞等拓本以賜羣臣故傳於世數本歐陽公集古不録定武本謂與王沂公家所刻不異自山谷嘉定武本以為肥不剩肉瘦不露骨於是士大夫爭寶之其實或肥或瘦皆有佳處此本差肥而最有精神號唐古本或云在永興年若定武自有三本獨民間李氏本為勝其餘用李本再刻益瘦細矣尤袤汪氏藏本定武之説不一有李學究所藏見春渚記聞有孟水清所獻見姚氏叢語又集古所録四本其得於王文公家者與定武民間兩本分毫不異當時自有數本明矣今所見之種或闕或完而完本又有肥瘦之異世皆以定武目之筆法相去不逺皆是舊刻而薛氏所摹易偶是闕本或者遂以完闕辨先後而謂薛氏鑱去五字以自别未為至論然校三本之優劣則肥而完者最得運筆意薛道祖籖題為唐古本乃此本也尤為可寶王厚之淳熙戊戌五月甲寅自承平時中山石刻屢為好事者負去如此本固已不易得况太行北嶽墮胡塵中已五十年乎撫卷太息陸遊觀王順伯袁起巖論蘭亭序如尤延之著語猶未免有疑論余乃安敢復措説於其間但味務觀之言亦復慨然有楚囚之歎耳朱熹蘭亭刻石雖佳本皆不免有可恨此唐人響拓乃獨縱橫放肆不為法度拘窘猶可想見繭紙故書之超軼絶塵也其后書乾符元年三月而觀者或以不與史合為疑豫按歐陽公集古録率以石本證史家之誤此獨不可據以為證乎陸遊世傳唐文皇所愛蘭亭蓋草稿也羲之醉中所書醒后屢作皆不及之詔十八學士摹寫又不知用何工本孰為精到初本既歸昭陵流落世間皆摹寫者今人多重定武本問其所分别不過以一二字為證余過定武得二本一差肥似新刻者一謂舊本與人所取又不同余亦未能辨其是否近得唐拓賜侍臣本卷尾三印曰賜書翰林院文字延資庫之印備一時官吏銜名有蔡君謨跋刋之郡齋甫畢而遊君少逵持所藏定武本余來見而喜既不去手因并書之王信誠之所刻本第十及十一行內有異字十一十二行內有句章令滿騫字蘭亭序古今共寶之而入石者非一當以定武古本最勝徽猷閣直學士胡世將守豫章刋二本一出於錢氏貞觀石本一不言所出然俱不逮定武本也此本豫得之江南真定武古本方兵火蹂躪之餘世益難得尤為可貴也淡巖老人書紹興己未十一月三十日余嘗從觀所藏蘭亭二本相類一肥一瘦尤延之謂瘦者乃真定武本而順伯則主肥者二公皆好古博雅其辨古刻之真偽皆為後輩所推今不同如此孰能決之此本乃類其瘦者順伯既著語矣曷就延之而正焉以究其説陸九淵蘭亭舊刻此本最勝而世貴定武本特因山谷之論爾余在中祕見唐人臨本皆肥以楊柳所藏薛道祖所題本驗之實唐古本也而近世以此為定武則誤矣余凡見前輩所跋定武本悉有依據不敢臆斷其湍流帶右天五字皆損後有見余所嘗見者當自識之難以筆舌辨也尤袤舊見里中人藏此本卷末有何子楚跋語云石晉之亂契丹自中原輦國貨圖書至真定德光死漢祖起太原遂棄此石於山中慶厯中其石歸李學究李死其子始摹以售人後負官緡宋景文為帥出公帑代輸取石匣藏庫中非交舊莫得見熙寧中薛師正為守其子紹彭别刻本易歸長安大觀間詔取石龕置宣和殿丙午與岐陽石鼓俱載以北子楚余不熟其為人而其説之詳如此恐或有所傳承也晚又得姚令升跋范元卿郎中本云慶厯中宋景文為定帥有遊子携此石走四方最後死營妓家伶人孟水清取以獻景文愛而不受留之公帑元豐中薛師正為帥始携石去其長子留偽本於郡鑱去湍流帶右天五字以為驗令升之説如此顧與何君山不合未知孰是順伯出此本欲余著語余曰右軍落筆時真有神助醒後更書數十本皆不及想其妙處雖右軍自不能形容余尚何言輒書所聞二説於後期與博聞君子共考訂之沈癸紹興初遣中貴衛茂實交河南地界是時講好之初人使往來中都宮闕尚容觀瞻衛因與同事趙彥恬遍厯其間至一閣壁庋上有小匣徽皇御筆題云真定武蘭亭有本十軸遂置其匣袖之以歸使回各藏其一餘皆上之九重世昌嘗見其孫監丞言此定武蘭亭序熙寧中薛師正為帥其子紹彭竊歸洛陽斫損湍流帶右天數字以惑人宣和間歸御府建炎初宗澤送之維揚金人焚維揚方不知所在此本未斫損乃舊日定武所招尤可貴重黃太史謂肥不剩肉瘦不露骨謂此帖也臨川王厚之跋長興施氏本唐太宗得右軍蘭亭序真迹使趙模拓以十本賜方鎮惟定武用玉石刻之文宗朝舒元興作牡丹賦刻之碑陰事見墨藪今墨藪無之世號定武本薛似尚書之為帥求之不得其猶子紹彭索公厨有石鎮肉乃刻牡丹賦於背者道祖别刻石以易之携玉石歸長安宣和中詔取之乃連夜墨拓冀得多蓄流傳人間每疊三紙加氈墨焉故最下近石字肉為真在上二紙字畫愈細浙西都監楊伯時與薛氏孫為工部郎經同為曹氏壻得薛氏本題清閟堂法書墨本最為近古今亡之聞為某人借去某人者死問其子不知所在淳熙甲辰春與伯時相遇於臨安得其崖略再見於京口復叩其詳云爾因録所聞書之薛道祖本後周勛去年使北還定武送伴以民間所藏書本見示正類此若郡所持售者又不及府治續刻本因書於後永嘉許及之紹興甲寅九月望日必大與子中兄自少喜收法書前後得禊帖以十數共評遊氏所藏謂謝脫拘束而動容周旋以印印泥不無愜當筆意奕奕妙入神品蓋傳於今者惟定武瘦者最佳兹其一也周必大題慶元丁巳臘月丁酉南華以副墨為子洛誦為孫豫亦謂前賢筆迹真者當祖之臨者宜孫之既鐫之石又傳之摹本其屬猶近繼此益逺矣今定武蘭亭帖其去昭陵所得殆曾孫行耶豫竊傷之昭陵繭紙既受發藏之辱定武堅珉又遭兵燹之禍獨其曾孫得至衣冠禮樂之地而見貴於中華士大夫之筆復三歎而為之喜又聞定武珍其石恐碑上損之故摹本多淡且有二本其一頗瘠此豈淡而瘠者乎其骨相必肖其祖見者當默識之豫章京堂題慶元戊午長至日蘭亭修禊敘世固不乏特佳本則精神煥發意態橫生平生所閲亦多然如此本不過五六與宿得於蘇魏公家本爭雄長皆熙寧以前所拓山谷所謂肥不剩肉瘦不露骨正此帖也吳興施宿題以上六跋續得於祖武本後蘭亭葬昭陵真迹不復出模勒豈無誤拓本徒倣佛能解此意然後可與語蘭亭也流俗不察獨取定武本為真妄矣豫頃見唐刻本有二一是貞觀間石刻一是泗南山杜氏所藏板本崇寧初來老嘗模刻於寶晉齋為三米蘭亭鋒勢筆法絶不類他本區區寶愛定武本者是不知有唐刻本也大抵墨迹與碑刻差謬豈止有千百里之逺粗能存其典型而已何必高資厚遺爭相搜訪苟或得之自謂獲真本者是尤可笑也玩古主人蔡山父題陶安世古本定武蘭亭石刻富春何子楚能道其詳唐日正本石晉末耶律德光輦而歸棄之中山為土人李學究所得韓魏公索之急李瘞諸地中而别刻以獻李死其子乃出之宋景文公始買置公帑後為薛紹彭換取至大觀間遂入宣和殿靖康中竟落北方故世傳定武者有二今宜中所藏兩卷此其善者也容齋跋定武本市馬以神駿為主無論屈冀觀婦人以美為主無論燕越書亦然順伯所藏修禊兩副本皆遒崒精麗凛乎其生意存不必深辨為定武否也同上跋王順伯别本定武本自承平時已不易得况今日乎書學失其傳久矣楷法出蘭亭近世以書名家者返不知也贊皇李處全題定武舊本蘭亭序右軍得意書唐虞世南輩皆嘗摹傳兵火之餘所有亡幾宜城太守趙公介然聞宗人明逺有舊藏者出而觀之謂真虞永興本也命勒於石元勛不伐趙明逺本紹興五年三月庚寅逸少蘭亭敘曾祖翰林所傳先王國中舊書實唐刻也元與樂毅論同卷今釐為二宣和元年十二月魯郡守錢伯定遜叔記建炎二年五月二十八日丹陽郡齋雨中與李成季賞鑑刻參校六七字不同李成季賞鑑刻今附卷末蘭亭舊刻今不知所在傳於士大夫家者凡三本此最為真樂靜堂成季題李公昭玘漢老伯父頃在彭門見醫者田務本家蕭生取蘭亭圖風神蕭灑不類塵俗中物為題其後云見贊永云田生以余賞之輒祕其畫然畫實竒手也適道姓于出蘭亭古帖見伯父舍人公跋其尾謂所見三本此本最真伯父蓄此帖當增九鼎之重矣適道其寶之勿輕以示人他日隨銀杯羽化當思僕言致和丁酉五月朔雲龕小隱書此帖本濟北于氏舊物余頃跋其後戒其勿輕以示人意謂于氏不能有也後十二年而當建炎二年余自山陽來嘉禾道過丹徒帥守遜叔侍郎出以示余觀伯父手澤并舊題恍然如隔世其間得喪存沒事亦何限而余亦老矣且知于氏果不能有也感物化之無常悼嵗月之遷流為之增慨十一月三日巨野李邴漢老書比年石刻燔毁略盡此本獨有存疑有神佛護持韓駒丹陽蘇子美家所收褚遂良臨貞觀蘭亭正類錢氏國中舊書與今世間所傳異矣曾軒蘭亭修禊敘真迹陪葬昭陵世所傳摹刻皆唐人臨寫雖工拙不同要皆可觀此其一也紹興乙丑得之蔡􅏒直矢白下潯叟此是王承可蘇緯觀黃叔文觀王安國朱輶戊辰十月二十六日觀於五羊郡齋此本今藏攻愧齋蘭亭考卷六
